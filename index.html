<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QWIZZ Expert V5.2.0-Ultimate</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --font: 'Outfit', sans-serif;
      --qr-size: 24vmin;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
    body, html { width:100%; height:100%; background:var(--bg); color:#fff; font-family:var(--font); overflow:hidden; font-size:16px; }

    #ambient { position:fixed; inset:0; background: radial-gradient(circle at 20% 40%, rgba(0,168,255,0.1), transparent 50%), radial-gradient(circle at 80% 20%, rgba(138,43,226,0.08), transparent 50%); z-index:0; }

    /* Splash / Idle */
    #idle { position:fixed; inset:0; background:var(--bg); display:flex; justify-content:center; align-items:center; z-index:200; transition:opacity .8s; }
    #idle.gone { opacity:0; pointer-events:none; }
    .idle-logo { width:80vmin; filter: drop-shadow(0 0 50px var(--blue)); }

    /* Main Flex Layout */
    #game-scene { position:fixed; inset:0; display:flex; align-items:center; justify-content:space-around; padding:8vmin; opacity:0; transition:opacity .6s; z-index:10; }
    #game-scene.visible { opacity:1; }

    .player-left { flex:1; display:flex; justify-content:center; align-items:center; }
    .player-right { flex:1; display:flex; flex-direction:column; justify-content:center; padding-left:5vmin; }

    .cover-frame {
      position:relative; width:65vmin; height:65vmin; border-radius:4vmin; overflow:hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.9); border: 2px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, #1A1A3A 0%, #09072B 100%);
    }

    #cover-img, #cover-blurred { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity .6s; }
    #cover-img { z-index:2; }
    #cover-blurred { z-index:1; filter:blur(40px) brightness(0.7); }

    /* NoCover CSS Fallback */
    #nocover-fallback { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:0; }
    #nocover-fallback img { width:80%; opacity:0.9; }

    .track-title { font-size: 7rem; font-weight: 900; line-height: 1.1; margin-bottom: 2vmin; color:#fff; word-wrap:break-word; }
    .track-artist { font-size: 3.5rem; font-weight: 300; color: rgba(255,255,255,0.7); }

    /* Components */
    #leaderboard {
      position:fixed; background:rgba(15,12,45,0.98); backdrop-filter:blur(50px);
      border:1px solid rgba(0,168,255,0.3); border-radius:4vmin; padding:4vmin;
      display:none; z-index:500; box-shadow:0 30px 100px rgba(0,0,0,0.8);
    }
    #leaderboard.mode-full { inset:5vmin; display:flex!important; flex-direction:column; justify-content:center; }
    #leaderboard.mode-br { bottom:5vmin; right:5vmin; width:36vw; display:block!important; animation: slideIn .6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    .lb-row { display:flex; align-items:center; padding:1.8vmin 3vmin; background:rgba(255,255,255,0.05); border-radius:2vmin; margin-bottom:1.2vmin; border:1px solid rgba(255,255,255,0.05); }
    .lb-name { flex:1; font-weight:700; font-size:3rem; padding:0 3vmin; }
    .lb-score { font-weight:900; font-size:3rem; color:var(--blue); }
    .lb-rank { font-size:2.8rem; font-weight:900; color:rgba(255,255,255,0.3); width:6vmin; text-align:center; }

    /* QR Code */
    #qr-box { position:fixed; z-index:800; display:none; background:rgba(15,12,45,0.95); padding:3vmin; border-radius:4vmin; border:2px solid var(--blue); backdrop-filter:blur(30px); }
    #qr-box.visible { display:flex; flex-direction:column; align-items:center; }
    .pos-top-right { top:4vmin; right:4vmin; }
    .pos-top-left { top:4vmin; left:4vmin; }
    .pos-bottom-right { bottom:4vmin; right:4vmin; }
    .pos-bottom-left { bottom:4vmin; left:4vmin; }
    .pos-center { top:50%; left:50%; transform:translate(-50%,-50%); }

    /* Top Layers */
    #overlay-layer { position:fixed; inset:0; z-index:20000; display:none; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; }
    #overlay-layer.active { display:flex; }

    #podium-box { display:flex; align-items:flex-end; gap:5vmin; height:60vh; width:90vw; margin-top:5vh; }
    .podium-seat { flex:1; display:flex; flex-direction:column; align-items:center; padding:3vmin; border-radius:3vmin 3vmin 0 0; background:rgba(255,255,255,0.05); transition: height 1s; }
    .rank-1 { height:100%; border:3px solid #FFD700; order:2; background:linear-gradient(180deg, rgba(255,215,0,0.1) 0%, transparent 100%); }
    .rank-2 { height:80%; border:3px solid #C0C0C0; order:1; }
    .rank-3 { height:65%; border:3px solid #CD7F32; order:3; }

    cast-media-player { position:fixed; inset:0; z-index:1; opacity:0; transition:opacity .6s; }
    body.video-revealed cast-media-player { opacity:1; z-index:100!important; }

    @keyframes slideIn { from{transform:translateY(50px); opacity:0;} to{transform:translateY(0); opacity:1;} }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  </style>
</head>

<body>
  <div id="ambient"></div>

  <div id="idle">
    <img id="idle-logo" class="idle-logo">
  </div>

  <div id="game-scene">
    <div class="player-left">
      <div class="cover-frame">
        <div id="nocover-fallback"><img src="nocover.png"></div>
        <img id="cover-blurred">
        <img id="cover-img">
      </div>
    </div>
    <div class="player-right">
      <div id="track-meta">
        <div class="track-title" id="t-title"></div>
        <div class="track-artist" id="t-artist"></div>
      </div>
    </div>
  </div>

  <div id="leaderboard" class="mode-br">
    <div class="lb-header" style="font-size:3.5rem; letter-spacing:1vmin; margin-bottom:3vmin">🏆 CLASSEMENT</div>
    <div id="lb-items"></div>
  </div>

  <div id="qr-box" class="pos-top-right">
    <div style="font-size:2.5rem; font-weight:900; margin-bottom:2vmin; color:var(--blue)">REJOINDRE</div>
    <img id="qr-code" style="width:var(--qr-size); background:#fff; padding:1.5vmin; border-radius:2vmin;">
  </div>

  <div id="overlay-layer">
    <div id="cat-display" style="display:none; flex-direction:column; align-items:center;">
       <h1 id="cat-name" style="font-size:10rem; font-weight:900; letter-spacing:4vmin; text-transform:uppercase;">CATÉGORIE</h1>
    </div>
    <div id="podium-display" style="display:none; flex-direction:column; align-items:center;">
       <h1 style="font-size:6rem; font-weight:900; margin-bottom:4vmin; color:var(--blue)">BRAVO !</h1>
       <div id="podium-box"></div>
    </div>
  </div>

  <div style="position:fixed; top:4vmin; right:6vmin; z-index:9999"><img id="sub-logo" style="width:25vmin"></div>
  <cast-media-player></cast-media-player>

  <script>
    var serverURL = '';
    var isRevealed = false;
    var currentTrack = null;
    var catTimer = null;

    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();

    function initServer(u) {
      if(!u) return;
      serverURL = u.endsWith('/') ? u.slice(0,-1) : u;
      ['idle-logo', 'sub-logo'].forEach(id => {
        document.getElementById(id).src = serverURL + '/tv_logo?t=' + Date.now();
      });
      startPolling();
    }

    function sync(d) {
      if(!d) return;
      if(typeof d === 'string') { try{d=JSON.parse(d);}catch(e){return;} }
      
      if(d.type === 'reload') { window.location.reload(true); return; }
      if(d.serverURL) initServer(d.serverURL);
      if(d.type === 'track_update' || d.trackID) renderTrack(d.track || d);
      if(d.type === 'reveal' || d.reveal === true || d.gameState === 'revealed') reveal();
      
      if(d.type === 'appearance' || d.showScores !== undefined || d.data) applyLayout(d.data || d);
      if(d.type === 'show_qr') toggleQR(d.show, d.url, d.position);
      
      if(d.type === 'category_transition') showCategory(d);
      if(d.type === 'end_game') renderPodium(d.data);
    }

    function renderTrack(track) {
      if(!track || !track.trackID) return;
      currentTrack = track;
      isRevealed = (track.gameState === 'revealed' || track.reveal === true);

      document.getElementById('idle').classList.add('gone');
      document.getElementById('game-scene').classList.add('visible');
      document.getElementById('overlay-layer').classList.remove('active');
      document.body.classList.remove('video-revealed');

      var i = document.getElementById('cover-img'), b = document.getElementById('cover-blurred');
      i.src = ''; b.src = ''; i.style.opacity = '0'; b.style.opacity = '0';

      if(!isRevealed) {
        document.getElementById('t-title').textContent = "QUEL EST LE TITRE ?";
        document.getElementById('t-artist').textContent = "???";
      } else {
        document.getElementById('t-title').textContent = track.title || "";
        document.getElementById('t-artist').textContent = track.artist || "";
      }

      if(track.cover && !track.cover.includes('no_cover')) {
        var src = (track.cover.startsWith('http') ? track.cover : (serverURL + track.cover)) + '&t=' + Date.now();
        b.src = src;
        b.onload = () => { if(track.shouldBlur && !isRevealed) b.style.opacity = '1'; };
        i.src = src;
        if(isRevealed) { i.style.opacity = '1'; b.style.opacity = '0'; }
      }

      if(isRevealed) reveal();
    }

    function reveal() {
      if(!currentTrack) return;
      isRevealed = true;
      document.getElementById('t-title').textContent = currentTrack.title || "";
      document.getElementById('t-artist').textContent = currentTrack.artist || "";
      
      var i = document.getElementById('cover-img'), b = document.getElementById('cover-blurred');
      if(i.src && i.src.length > 5 && !i.src.includes('nocover')) {
         i.style.opacity = '1'; b.style.opacity = '0';
      }
      if(currentTrack.isVideo) document.body.classList.add('video-revealed');
    }

    function applyLayout(d) {
      if(!d) return;
      var lb = document.getElementById('leaderboard');
      var show = (d.showScores === true || d.showScores === "true");
      var mode = d.scoreAnimationMode || 'mode-br';
      
      if(show) {
         lb.className = (mode === 'full' ? 'mode-full' : 'mode-br');
         lb.style.display = 'block';
         if(d.players) {
            var s = d.players.sort((a,b) => b.score - a.score).slice(0, 8);
            document.getElementById('lb-items').innerHTML = s.map((p, idx) => `
              <div class="lb-row">
                <span class="lb-rank">${idx+1}</span>
                <span class="lb-name">${p.name}</span>
                <span class="lb-score">${p.score} pts</span>
              </div>
            `).join('');
         }
      } else { lb.style.display = 'none'; }
      
      if(d.qrPosition || d.position) toggleQR(null, null, d.qrPosition || d.position);
    }

    function toggleQR(show, url, pos) {
      var box = document.getElementById('qr-box');
      if(show === true) box.classList.add('visible');
      if(show === false) box.classList.remove('visible');
      if(url) document.getElementById('qr-code').src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url);
      if(pos) { box.className = 'visible pos-' + pos; }
    }

    function showCategory(d) {
      document.getElementById('cat-name').textContent = d.name;
      document.getElementById('overlay-layer').classList.add('active');
      document.getElementById('cat-display').style.display = 'flex';
      document.getElementById('podium-display').style.display = 'none';
      if(catTimer) clearTimeout(catTimer);
      catTimer = setTimeout(() => {
        document.getElementById('overlay-layer').classList.remove('active');
        document.getElementById('cat-display').style.display = 'none';
      }, (d.duration || 4) * 1000);
    }

    function renderPodium(data) {
      if(!data) return;
      var top3 = data.sort((a,b) => b.score - a.score).slice(0, 3);
      var medals = ["🥈", "🥇", "🥉"];
      document.getElementById('podium-box').innerHTML = top3.map((p, idx) => `
        <div class="podium-seat rank-${idx+1}">
          <div style="font-size:8rem; margin-bottom:2vmin">${medals[idx]}</div>
          <div style="font-size:3.5rem; font-weight:900">${p.name}</div>
          <div style="font-size:3rem; color:var(--blue)">${p.score} pts</div>
        </div>
      `).join('');
      document.getElementById('overlay-layer').classList.add('active');
      document.getElementById('podium-display').style.display = 'flex';
      document.getElementById('cat-display').style.display = 'none';
    }

    function startPolling() {
      if(window.poll) clearInterval(window.poll);
      window.poll = setInterval(() => {
        if(!serverURL) return;
        fetch(serverURL + '/tv_state').then(r=>r.json()).then(sync).catch(()=>{});
      }, 5000);
    }

    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, req => {
      if(req.media && req.media.customData) {
        if(req.media.customData.serverURL) initServer(req.media.customData.serverURL);
        if(req.media.customData.trackID) renderTrack(req.media.customData);
      }
      return req;
    });

    ctx.addCustomMessageListener('urn:x-cast:com.qwizz.control', e => sync(e.data));
    ctx.start();
    console.log("QWIZZ V5.2.0-Ultimate Started");
  </script>
</body>
</html>

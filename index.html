<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QWIZZ Master V5.3.0-Premium</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --glass: rgba(26, 26, 58, 0.85);
      --font: 'Outfit', sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
    body, html { width:100%; height:100%; background:var(--bg); color:#fff; font-family:var(--font); overflow:hidden; font-size:1.5vmin; }

    #ambient {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 168, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(138, 43, 226, 0.08) 0%, transparent 40%),
        var(--bg);
    }

    /* Idle / Intro */
    #idle {
      position:fixed; inset:0; background:var(--bg); z-index:500;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      transition: opacity 1s ease-in-out;
    }
    #idle.gone { opacity:0; pointer-events:none; }
    .idle-logo { width:75vmin; filter: drop-shadow(0 0 50px rgba(0,168,255,0.7)); animation: pulseLogo 4s ease-in-out infinite; }
    .idle-status { font-size:2.5rem; font-weight:700; letter-spacing:1.5vmin; color:var(--blue); margin-top:4vmin; text-transform:uppercase; opacity:0.6; }

    /* Main Scene */
    #player-scene {
      position:fixed; inset:0; z-index:10; padding:8vmin;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition: opacity 0.6s;
    }
    #player-scene.visible { opacity:1; }

    .main-grid { display:flex; align-items:center; gap:8vmin; width:100%; max-width:170vmin; }

    .cover-side { position:relative; width:62vmin; height:62vmin; flex-shrink:0; }
    .cover-card {
      position:relative; width:100%; height:100%; border-radius:5vmin; overflow:hidden;
      box-shadow: 0 40px 120px rgba(0,0,0,0.9); border: 2.5px solid rgba(255,255,255,0.15);
      background: linear-gradient(135deg, #1A1A3A 0%, #09072B 100%);
    }

    #img-main, #img-blur { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity .8s cubic-bezier(0.19, 1, 0.22, 1); }
    #img-main { z-index:2; }
    #img-blur { z-index:1; filter:blur(40px) brightness(0.7); }

    .track-info { flex:1; display:flex; flex-direction:column; justify-content:center; }
    .track-title { font-size:7rem; font-weight:900; line-height:1.1; margin-bottom:2vmin; text-shadow:0 10px 40px rgba(0,0,0,0.8); }
    .track-artist { font-size:3.5rem; font-weight:300; color:rgba(255,255,255,0.7); letter-spacing:0.1vmin; }

    /* Floating UI Elements */
    #leaderboard {
      position:fixed; z-index:1000; display:none;
      background: var(--glass); backdrop-filter: blur(40px);
      border: 1px solid rgba(0,168,255,0.3); border-radius:5vmin; padding:4vmin;
      box-shadow: 0 40px 130px rgba(0,0,0,0.9);
    }
    #leaderboard.mode-full { inset:8vmin; display:flex !important; flex-direction:column; justify-content:center; }
    #leaderboard.mode-br { bottom:5vmin; right:5vmin; width:38vw; display:block !important; animation: slideUp .6s; }

    .lb-row { display:flex; align-items:center; height:9vmin; padding:2vmin 4vmin; background:rgba(255,255,255,0.06); border-radius:3vmin; margin-bottom:1.5vmin; border:1px solid rgba(255,255,255,0.1); }
    .lb-rank { width:6vmin; font-weight:900; font-size:3rem; color:var(--blue); opacity:0.5; }
    .lb-name { flex:1; font-weight:700; font-size:3.2rem; padding:0 3vmin; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lb-score { font-weight:900; font-size:3.2rem; color:var(--blue); min-width:15vmin; text-align:right; }

    #qr-float {
      position:fixed; z-index:2000; display:none; text-align:center;
      background: var(--glass); backdrop-filter: blur(40px);
      padding:3.5vmin; border-radius:5vmin; border:2.5px solid var(--blue);
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }
    #qr-float.visible { display:block; animation: popQR 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .qr-title { font-size:2.4rem; font-weight:900; margin-bottom:2vmin; color:var(--blue); text-transform:uppercase; letter-spacing:0.3vmin; }
    .qr-img { background:#fff; padding:1.5vmin; border-radius:2.5vmin; width:22vmin; height:22vmin; margin:0 auto; }

    /* Transitions & Overlays */
    #overlay-layer { position:fixed; inset:0; z-index:50000; display:none; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; }
    #overlay-layer.active { display:flex; animation: fadeIn .5s; }

    .podium-stage { display:flex; align-items:flex-end; gap:5vmin; height:60vh; width:90vw; margin-top:5vh; }
    .podium-box { flex:1; display:flex; flex-direction:column; align-items:center; padding:4vmin; border-radius:4vmin 4vmin 1vmin 1vmin; background:rgba(255,255,255,0.04); }
    .rank-1 { height:100%; border:3px solid #FFD700; order:2; background: linear-gradient(180deg, rgba(255,215,0,0.1) 0%, transparent 100%); }
    .rank-2 { height:80%; border:3px solid #C0C0C0; order:1; }
    .rank-3 { height:65%; border:3px solid #CD7F32; order:3; }
    .p-trophy { font-size:10rem; margin-bottom:3vmin; filter: drop-shadow(0 0 30px rgba(255,255,255,0.3)); }
    .p-name { font-size:4.5rem; font-weight:900; margin-top:auto; }

    /* Utils */
    .pos-top-right { top:4vmin; right:4vmin; }
    .pos-top-left { top:4vmin; left:4vmin; }
    .pos-bottom-right { bottom:4vmin; right:4vmin; }
    .pos-bottom-left { bottom:4vmin; left:4vmin; }
    .pos-center { top:50%; left:50%; transform:translate(-50%, -50%); }

    cast-media-player { position:fixed; inset:0; z-index:1; opacity:0; transition:opacity .6s; }
    body.video-active cast-media-player { opacity:1; z-index:100 !important; }

    @keyframes pulseLogo { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 50px rgba(0,168,255,0.7)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 80px rgba(0,168,255,0.9)); } }
    @keyframes slideUp { from { transform: translateY(100px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    @keyframes popQR { from { transform: scale(0.5) translateY(50px); opacity:0; } to { transform: scale(1) translateY(0); opacity:1; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>

<body>
  <div id="ambient"></div>

  <div id="idle">
    <img id="logo-idle" class="idle-logo">
    <div class="idle-status">Ready to Play</div>
  </div>

  <div id="player-scene">
    <div class="main-grid">
      <div class="cover-side">
        <div class="cover-card">
          <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:0"><img src="nocover.png" style="width:80%"></div>
          <img id="img-blur">
          <img id="img-main">
        </div>
      </div>
      <div class="track-info">
        <div class="track-title" id="t-title"></div>
        <div class="track-artist" id="t-artist"></div>
      </div>
    </div>
  </div>

  <div id="leaderboard" class="mode-br">
    <div style="font-size:3.5rem; font-weight:900; color:var(--blue); letter-spacing:1vmin; margin-bottom:4vmin">🏆 CLASSEMENT</div>
    <div id="lb-list" style="width:100%"></div>
  </div>

  <div id="qr-float" class="pos-top-right">
    <div class="qr-title">Rejoindre la partie</div>
    <div class="qr-img"><img id="img-qr" style="width:100%;height:100%;object-fit:contain"></div>
  </div>

  <div id="overlay-layer">
    <div id="cat-wrap" style="display:none; flex-direction:column; align-items:center">
      <h1 id="cat-name" style="font-size:12rem; font-weight:900; letter-spacing:6vmin; text-transform:uppercase; filter: drop-shadow(0 0 50px var(--blue))">CATEGORY</h1>
    </div>
    <div id="podium-wrap" style="display:none; flex-direction:column; align-items:center; width:100%">
      <h1 style="font-size:6rem; font-weight:900; color:var(--blue); text-transform:uppercase; margin-bottom:5vmin">Top Players</h1>
      <div id="podium-items" class="podium-stage"></div>
    </div>
  </div>

  <div style="position:fixed; top:4vmin; right:6vmin; z-index:9999"><img id="logo-top" style="width:25vmin"></div>
  <cast-media-player></cast-media-player>

  <script>
    // Master State V5.3.1 — QR local, leaderboard toggle, Cast channel
    var STATE = {
      serverURL: '', track: null, revealed: false,
      showScores: false, scoreMode: 'br',
      showQR: false, qrURL: '', qrPos: 'top-right'
    };

    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();

    function sync(d) {
      if(!d) return;
      if(typeof d === 'string') { try{d=JSON.parse(d);}catch(e){return;} }

      if(d.type === 'reload') { window.location.reload(true); return; }

      if(d.serverURL) {
        STATE.serverURL = d.serverURL.endsWith('/') ? d.serverURL.slice(0,-1) : d.serverURL;
        ['logo-idle', 'logo-top'].forEach(id => document.getElementById(id).src = STATE.serverURL + '/tv_logo?t=' + Date.now());
        // Polling fallback toutes les 5s pour rester synchronisé
        if(!window.poll) window.poll = setInterval(() => { fetch(STATE.serverURL+'/tv_state').then(r=>r.json()).then(sync).catch(()=>{}) }, 5000);
      }

      if(d.type === 'track_update' || d.trackID) render(d.track || d);
      if(d.type === 'reveal' || d.gameState === 'revealed' || d.reveal === true) doReveal();

      // Mettre à jour la visibilité depuis chaque message
      if(d.showScores !== undefined) STATE.showScores = (d.showScores === true || d.showScores === "true");
      if(d.showQR !== undefined) STATE.showQR = (d.showQR === true || d.showQR === "true");
      if(d.qrPosition) STATE.qrPos = d.qrPosition;
      if(d.scoreAnimationMode) STATE.scoreMode = d.scoreAnimationMode;

      if(d.type === 'appearance' && d.data) {
        if(d.data.showScores !== undefined) STATE.showScores = (d.data.showScores === true || d.data.showScores === "true");
        if(d.data.qrPosition) STATE.qrPos = d.data.qrPosition;
        if(d.data.scoreAnimationMode) STATE.scoreMode = d.data.scoreAnimationMode;
      }
      if(d.type === 'show_qr') {
        STATE.showQR = d.show;
        if(d.url) STATE.qrURL = d.url;
        if(d.position) STATE.qrPos = d.position;
      }

      applyUI(d);

      if(d.type === 'category_transition') transition(d);
      if(d.type === 'end_game') podium(d.data);
    }

    function render(t) {
      if(!t || !t.trackID) return;
      STATE.track = t;
      STATE.revealed = (t.gameState === 'revealed' || t.reveal === true);

      document.getElementById('idle').classList.add('gone');
      document.getElementById('player-scene').classList.add('visible');
      document.getElementById('overlay-layer').classList.remove('active');
      document.body.classList.remove('video-active');

      var i = document.getElementById('img-main'), b = document.getElementById('img-blur');
      i.src = ''; b.src = ''; i.style.opacity = '0'; b.style.opacity = '0';

      // Affichage caché : "QUEL EST LE TITRE ?" / dévoilé : titre + artiste réels
      document.getElementById('t-title').textContent = STATE.revealed ? (t.title || "") : "QUEL EST LE TITRE ?";
      document.getElementById('t-artist').textContent = STATE.revealed ? (t.artist || "") : "???";

      if(t.cover && !t.cover.includes('no_cover')) {
        var src = (t.cover.startsWith('http') ? t.cover : (STATE.serverURL + t.cover)) + '&t=' + Date.now();
        b.src = src; b.onload = () => { if(t.shouldBlur && !STATE.revealed) b.style.opacity = '1' };
        i.src = src; if(STATE.revealed) { i.style.opacity = '1'; b.style.opacity = '0' }
      }
      if(STATE.revealed) doReveal();
    }

    function doReveal() {
      if(!STATE.track) return;
      STATE.revealed = true;
      document.getElementById('t-title').textContent = STATE.track.title || "";
      document.getElementById('t-artist').textContent = STATE.track.artist || "";
      var i = document.getElementById('img-main'), b = document.getElementById('img-blur');
      if(i.src && i.src.length > 5 && !i.src.includes('nocover')) { i.style.opacity = '1'; b.style.opacity = '0' }
      if(STATE.track.isVideo) document.body.classList.add('video-active');
    }

    function applyUI(d) {
      // Classement — affiché/masqué selon showScores
      var lb = document.getElementById('leaderboard');
      if(STATE.showScores) {
        lb.className = STATE.scoreMode === 'full' ? 'mode-full' : 'mode-br';
        lb.style.display = STATE.scoreMode === 'full' ? 'flex' : 'block';
        if(d && d.players) {
          var s = d.players.sort((a,b) => b.score - a.score).slice(0, 8);
          document.getElementById('lb-list').innerHTML = s.map((p, idx) => `<div class="lb-row"><span class="lb-rank">${idx+1}</span><span class="lb-name">${p.name}</span><span class="lb-score">${p.score} pts</span></div>`).join('');
        }
      } else { lb.style.display = 'none'; }

      // QR Code — généré localement depuis le serveur iOS (pas d'internet requis)
      var qr = document.getElementById('qr-float');
      if(STATE.showQR && STATE.serverURL) {
        qr.className = 'visible pos-' + STATE.qrPos;
        // Utiliser l'endpoint local /qr_code au lieu d'un service externe
        document.getElementById('img-qr').src = STATE.serverURL + '/qr_code?t=' + Date.now();
        qr.style.display = 'block';
      } else {
        qr.classList.remove('visible');
        qr.style.display = 'none';
      }
    }

    function transition(d) {
      document.getElementById('cat-name').textContent = d.name;
      document.getElementById('overlay-layer').classList.add('active');
      document.getElementById('cat-wrap').style.display = 'flex';
      document.getElementById('podium-wrap').style.display = 'none';
      setTimeout(() => document.getElementById('overlay-layer').classList.remove('active'), (d.duration || 4)*1000);
    }

    function podium(data) {
      var top3 = data.sort((a,b) => b.score - a.score).slice(0, 3);
      var m = ["🥈", "🥇", "🥉"];
      document.getElementById('podium-items').innerHTML = top3.map((p, idx) => `<div class="podium-box rank-${idx+1}"><div class="p-trophy">${m[idx]}</div><div class="p-name">${p.name}</div><div style="font-size:3.5rem;color:var(--blue);font-weight:700">${p.score} pts</div></div>`).join('');
      document.getElementById('overlay-layer').classList.add('active');
      document.getElementById('podium-wrap').style.display = 'flex';
      document.getElementById('cat-wrap').style.display = 'none';
    }

    // Intercepter le chargement média pour récupérer l'URL du serveur
    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, req => {
      if(req.media && req.media.customData) sync(req.media.customData);
      return req;
    });

    // Écouter les messages du canal Cast (urn:x-cast:com.qwizz.control)
    ctx.addCustomMessageListener('urn:x-cast:com.qwizz.control', e => sync(e.data));

    ctx.start({ disableIdleTimeout: true });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QWIZZ Chromecast Receiver V5.0.6-ZeroLatency</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --font: 'Outfit', sans-serif;
      --qr-size: 22vmin;
    }

    * { margin: 0; padding: 0; box-sizing: border-box }

    body, html {
      width: 100%; height: 100%;
      background: var(--bg); color: #fff;
      font-family: var(--font); overflow: hidden;
      font-size: 1.5vmin
    }

    #ambient {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0, 168, 255, .15) 0%, transparent 70%), 
                  radial-gradient(ellipse 40% 40% at 80% 20%, rgba(138, 43, 226, .12) 0%, transparent 70%);
      pointer-events: none; z-index: 0
    }

    #idle {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      z-index: 100; transition: opacity .8s ease
    }

    #idle.gone { opacity: 0; pointer-events: none }

    .idle-content {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      animation: fadeInUp 1.2s ease-out
    }

    .idle-logo {
      width: 85vmin; height: auto; margin-bottom: 4vmin;
      filter: drop-shadow(0 0 80px rgba(0, 168, 255, 0.7));
    }

    #player {
      position: fixed; inset: 0;
      display: grid; grid-template-columns: 45vw 1fr;
      padding: 8vmin; gap: 8vmin; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity .8s; z-index: 10
    }

    #player.visible { opacity: 1 }

    .cover-wrapper {
      position: relative; width: 60vmin; height: 60vmin;
      border-radius: 4vmin; overflow: hidden;
      border: 0.4vmin solid rgba(255, 255, 255, .15);
      box-shadow: 0 40px 120px rgba(0, 0, 0, .8);
      background: rgba(0, 0, 0, 0.4)
    }

    #cover, #cover-blurred {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
    }

    #cover { z-index: 2; }
    #cover-blurred { z-index: 1; filter: blur(35px) brightness(0.7); }

    cast-media-player {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0; transition: opacity 0.8s;
      --theme-hue: 200; background: var(--bg);
    }

    body.video-revealed cast-media-player { opacity: 1; z-index: 100 !important; }

    #cover-placeholder {
      position: absolute; inset: 0; border-radius: 3vmin;
      border: 2px dashed rgba(0, 168, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 25rem; color: rgba(0, 168, 255, .15); z-index: 0
    }

    .logo-area { position: fixed; top: 4vmin; right: 6vmin; z-index: 9999 }
    .logo-area img { width: 25vmin; height: auto; object-fit: contain; filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.6)) }

    .track-info { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; }
    .track-info.is-hidden { opacity: 0.85; filter: grayscale(1); }
    .track-title { font-size: 6rem; font-weight: 900; line-height: 1.1; margin-bottom: 2rem; text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6) }
    .track-artist { font-size: 3rem; color: #E0E0E0; font-weight: 300; opacity: 0.9; }

    #leaderboard {
      position: fixed; background: rgba(15, 12, 45, 0.96);
      border: 1px solid rgba(0, 168, 255, 0.3);
      border-radius: 4vmin; padding: 5vmin;
      backdrop-filter: blur(50px); z-index: 9000;
      display: none; box-shadow: 0 50px 150px rgba(0,0,0,0.85);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #leaderboard.mode-full {
      inset: 6vmin; display: flex; flex-direction: column;
      justify-content: center; align-items: stretch;
      background: radial-gradient(circle at center, rgba(26, 26, 58, 0.98) 0%, rgba(9, 7, 43, 0.99) 100%);
    }

    #leaderboard.mode-bottom-right {
      bottom: 5vmin; right: 5vmin; width: 35vw; display: block;
    }

    #leaderboard.mode-full .lb-row { padding: 3vmin 5vmin; margin-bottom: 2vmin; border-radius: 3vmin; }
    #leaderboard.mode-full .lb-name { font-size: 4rem; }
    #leaderboard.mode-full .lb-score { font-size: 4rem; }
    #leaderboard.mode-full .lb-rank { font-size: 3.5rem; width: 10vmin; }
    #leaderboard.mode-full .lb-header { font-size: 5rem; margin-bottom: 6vmin; }

    .lb-header { font-weight: 900; letter-spacing: 0.5vmin; color: var(--blue); text-transform: uppercase; margin-bottom: 4vmin; font-size: 3.5rem; text-align: center; border-bottom: 1px solid rgba(0,168,255,0.1); padding-bottom: 2vmin; }
    .lb-row { display: flex; align-items: center; gap: 3vmin; background: rgba(255, 255, 255, 0.04); padding: 2vmin 3vmin; border-radius: 2vmin; margin-bottom: 1.5vmin; opacity: 1; border: 1px solid rgba(255,255,255,0.06); }
    .lb-rank { width: 6vmin; font-weight: 900; font-size: 2.5rem; text-align: center; color: rgba(255,255,255,0.4); }
    .lb-name { flex: 1; font-weight: 700; font-size: 2.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 900; color: var(--blue); font-size: 2.8rem; }

    .lb-row.rank-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05)); border-color: rgba(255, 215, 0, 0.3); }
    .lb-row.rank-1 .lb-rank { color: #FFD700; }
    .lb-row.rank-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.12), rgba(192, 192, 192, 0.03)); border-color: rgba(192, 192, 192, 0.25); }
    .lb-row.rank-2 .lb-rank { color: #C0C0C0; }
    .lb-row.rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1), rgba(205, 127, 50, 0.02)); border-color: rgba(205, 127, 50, 0.2); }
    .lb-row.rank-3 .lb-rank { color: #CD7F32; }

    #qr-overlay {
      position: fixed; z-index: 10000; display: none;
      background: rgba(15, 12, 45, 0.96); backdrop-filter: blur(25px);
      padding: 4vmin; border-radius: 5vmin; border: 2px solid var(--blue);
      text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
    }
    #qr-overlay.visible { display: block; }

    /* Positioning classes */
    .pos-top-right { top: 4vmin; right: 4vmin; }
    .pos-top-left { top: 4vmin; left: 4vmin; }
    .pos-bottom-right { bottom: 4vmin; right: 4vmin; }
    .pos-bottom-left { bottom: 4vmin; left: 4vmin; }
    .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }

    #qr-img { width: var(--qr-size); height: var(--qr-size); background: #fff; padding: 1.5vmin; border-radius: 2vmin; }

    #pause-overlay, #category-overlay {
      position: fixed; inset: 0; background: rgba(9, 7, 43, 0.98);
      backdrop-filter: blur(50px); display: none; flex-direction: column;
      align-items: center; justify-content: center; z-index: 8000;
      text-align: center; padding: 5vmin;
    }
    #pause-overlay.visible, #category-overlay.visible { display: flex; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }

    #debug-log {
      position: fixed; bottom: 2vmin; left: 2vmin; z-index: 100000;
      background: rgba(0, 0, 0, 0.7); color: #0f0; font-family: monospace;
      font-size: 1.2vmin; padding: 1vmin; border-radius: 1vmin;
      max-width: 40vw; max-height: 20vh; overflow-y: auto;
      pointer-events: none; display: none;
    }
  </style>
</head>

<body>
  <div id="ambient"></div>

  <div id="idle">
    <div class="idle-content">
      <img id="idle-logo" class="idle-logo">
      <div style="font-size:8rem;font-weight:900;letter-spacing:2vmin;color:var(--blue)">PRÊT À QWIZZER ?</div>
      <div style="font-size:2.5rem;color:rgba(255,255,255,.4);margin-top:3vmin">En attente du début de la partie...</div>
    </div>
  </div>

  <div id="player">
    <div style="display:flex;align-items:center;justify-content:center">
      <div class="cover-wrapper">
        <div id="cover-placeholder">?</div>
        <img id="cover-blurred">
        <img id="cover">
      </div>
    </div>
    <div class="track-info" id="track-info-container">
      <div class="track-title" id="track-title"></div>
      <div class="track-artist" id="track-artist"></div>
    </div>
  </div>

  <div id="leaderboard" class="mode-bottom-right">
    <div class="lb-header">🏆 Classement</div>
    <div id="lb-list" style="width:100%"></div>
  </div>

  <div id="qr-overlay" class="pos-top-right">
    <div style="font-size:2.5rem;color:var(--blue);font-weight:900;margin-bottom:2vmin">REJOINDRE LE JEU</div>
    <img id="qr-img">
  </div>

  <div id="pause-overlay"><h1>PAUSE</h1><div id="pause-msg" style="font-size:3.5rem;max-width:80vw;line-height:1.4"></div></div>
  <div id="category-overlay"><div class="category-card"><h1 id="category-name-display" style="font-size:9rem;font-weight:900;text-transform:uppercase;letter-spacing:2vmin">CATEGORY</h1></div></div>

  <div class="logo-area" id="main-logo-wrap"><img id="logo-img"></div>
  <cast-media-player></cast-media-player>
  <div id="debug-log"></div>

  <script>
    var serverURL = '';
    var lastCategoryTime = 0;
    var lastTrackId = null;
    var isRevealed = false;
    var currentTrackData = null;
    
    function log(m) {
      console.log(m);
      var l = document.getElementById('debug-log');
      if(l) {
        var d = document.createElement('div');
        d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + m;
        l.appendChild(d);
        l.scrollTop = l.scrollHeight;
      }
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    function initS(u) {
      if(!u) return;
      serverURL = (u.endsWith('/') ? u.slice(0,-1) : u);
      log("SYNC SERVER: " + serverURL);
      ['logo-img', 'idle-logo'].forEach(id => {
        var el = document.getElementById(id);
        if(el) el.src = serverURL + '/tv_logo?t=' + Date.now();
      });
      startPoll();
    }

    function handle(d) {
      if(!d) return;
      if(typeof d === 'string') {
        try { d = JSON.parse(d); } catch(e) { log("Parse Error: " + e.message); return; }
      }
      
      log("RECV: " + (d.type || d.gameState || d.serverURL || "raw"));
      
      if(d.serverURL) initS(d.serverURL);
      if(d.players) renderLB(d.players);
      if(d.track) updateT(d.track);
      if(d.type === 'reveal' || d.reveal === true || d.gameState === 'revealed') revealInfo();
      if(d.isPaused !== undefined) toggleP(d.isPaused, d.pauseMessage);
      if(d.showScores !== undefined) applyA({showScores: d.showScores, scoreAnimationMode: d.scoreAnimationMode});
      if(d.showQR !== undefined) toggleQR(d.showQR, d.qrURL, d.qrPosition);
      
      if(d.type === 'track_update') updateT(d);
      else if(d.type === 'leaderboard') renderLB(d.players);
      else if(d.type === 'show_qr') toggleQR(d.show, d.url, d.position);
      else if(d.type === 'category_transition' && d.timestamp > lastCategoryTime) {
        lastCategoryTime = d.timestamp;
        showCat(d);
      }
    }

    function updateT(d) {
      if(!d || !d.trackID) {
        lastTrackId = null;
        document.getElementById('idle').classList.remove('gone');
        document.getElementById('player').classList.remove('visible');
        return;
      }
      
      currentTrackData = d;
      lastTrackId = d.trackID;
      isRevealed = (d.gameState === 'revealed' || d.reveal === true);
      
      document.getElementById('idle').classList.add('gone');
      document.getElementById('player').classList.add('visible');
      document.body.classList.remove('video-revealed');
      document.getElementById('category-overlay').classList.remove('visible');
      
      var infoContainer = document.getElementById('track-info-container');
      infoContainer.classList.toggle('is-hidden', !isRevealed);
      
      if (!isRevealed) {
          document.getElementById('track-title').textContent = "QUEL EST LE TITRE ?";
          document.getElementById('track-artist').textContent = "???";
      } else {
          document.getElementById('track-title').textContent = d.title || "";
          document.getElementById('track-artist').textContent = d.artist || "";
      }
      
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred'), p = document.getElementById('cover-placeholder');
      if(d.cover) {
        var src = (d.cover.startsWith('http') ? d.cover : (serverURL ? serverURL + d.cover : d.cover)) + '&t=' + Date.now();
        b.src = src; 
        b.onload = () => { if(d.shouldBlur && !isRevealed) { b.style.opacity = '1'; p.style.display = 'none'; } };
        
        i.src = src; 
        if (isRevealed) {
            i.style.opacity = '1'; b.style.opacity = '0'; p.style.display = 'none';
            if (d.isVideo) document.body.classList.add('video-revealed');
        } else {
            i.style.opacity = '0';
            if (d.shouldBlur) {
                // b.onload handles it
            } else {
                b.style.opacity = '0'; p.style.display = 'flex';
            }
        }
      } else {
        p.style.display = 'flex'; i.style.opacity = '0'; b.style.opacity = '0';
      }
      
      if(isRevealed) revealInfo();
    }

    function revealInfo() {
      if(!currentTrackData) return;
      isRevealed = true;
      document.getElementById('track-title').textContent = currentTrackData.title || "";
      document.getElementById('track-artist').textContent = currentTrackData.artist || "";
      document.getElementById('track-info-container').classList.remove('is-hidden');
      
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred'), p = document.getElementById('cover-placeholder');
      if(i) i.style.opacity = '1';
      if(b) b.style.opacity = '0';
      if(p) p.style.display = 'none';
      if (currentTrackData.isVideo) document.body.classList.add('video-revealed');
    }

    function renderLB(players) {
      if(!players) return;
      var l = document.getElementById('lb-list');
      var s = players.sort((a,b) => b.score - a.score).slice(0, 5);
      l.innerHTML = s.map((p, idx) => `
        <div class="lb-row rank-${idx+1}">
          <span class="lb-rank">${idx+1}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-score">${p.score} pts</span>
        </div>
      `).join('');
    }

    function applyA(d) {
      var lb = document.getElementById('leaderboard');
      if(d.showScores) {
          lb.style.display = (d.scoreAnimationMode === 'bottom-right' ? 'block' : 'flex');
          lb.className = (d.scoreAnimationMode === 'full' ? 'mode-full' : 'mode-bottom-right');
      } else {
          lb.style.display = 'none';
      }
    }

    function toggleQR(show, url, pos) {
      var q = document.getElementById('qr-overlay');
      if(show) {
        document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url || serverURL || window.location.href);
        q.className = 'visible';
        if(pos) q.classList.add('pos-' + pos);
        else q.classList.add('pos-top-right');
      } else q.className = '';
    }

    function showCat(d) {
      document.getElementById('category-name-display').textContent = d.name;
      document.getElementById('category-overlay').classList.add('visible');
      setTimeout(() => { document.getElementById('category-overlay').classList.remove('visible'); }, d.duration ? (d.duration * 1000) : 4000);
    }

    function toggleP(p, m) {
      var o = document.getElementById('pause-overlay');
      if(p) { o.classList.add('visible'); document.getElementById('pause-msg').textContent = m || ""; }
      else o.classList.remove('visible');
    }

    function startPoll() {
      if(window.pollTimer) clearInterval(window.pollTimer);
      window.pollTimer = setInterval(() => {
        if(!serverURL) return;
        fetch(serverURL + '/tv_state').then(r => r.json()).then(handle).catch(()=>{});
      }, 5000);
    }

    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, req => {
      if(req.media && req.media.customData) {
        if(req.media.customData.serverURL) initS(req.media.customData.serverURL);
        if(req.media.customData.trackID) {
            updateT(req.media.customData);
        }
      }
      return req;
    });

    context.addCustomMessageListener('urn:x-cast:com.qwizz.control', e => handle(e.data));
    context.start();
    log("Receiver Started V5.0.6");
  </script>
</body>
</html>

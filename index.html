<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWIZZ Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09072B;
            --blue: #00A8FF;
            --purple: #8A2BE2;
            --white: #FFFFFF;
            --gray: #E0E0E0;
            --panel: #1A1A3A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* ── Background ambient glow ── */
        #ambient {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0,168,255,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 20%, rgba(138,43,226,0.10) 0%, transparent 70%);
            pointer-events: none;
            transition: opacity 1s;
        }

        /* ── Idle screen ── */
        #idle {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: opacity 0.8s;
        }

        #idle h1 {
            font-size: 96px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        #idle p {
            font-size: 24px;
            color: var(--gray);
            opacity: 0.6;
            letter-spacing: 2px;
        }

        /* ── Player screen ── */
        #player {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 60px;
            gap: 60px;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s;
        }

        /* ── Cover art ── */
        #cover-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cover {
            width: 480px;
            height: 480px;
            border-radius: 24px;
            border: 2px solid rgba(255,255,255,0.15);
            object-fit: cover;
            box-shadow:
                0 30px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(0,168,255,0.15);
            display: none;
        }

        #cover-placeholder {
            width: 480px;
            height: 480px;
            border-radius: 24px;
            border: 2px dashed rgba(0,168,255,0.3);
            background: var(--panel);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 140px;
        }

        /* ── Right panel ── */
        .right {
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        /* Logo */
        .logo-text {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--blue);
            text-shadow: 0 0 30px rgba(0,168,255,0.4);
        }

        /* Track info */
        .track-block { margin-bottom: 0; }
        .track-title {
            font-size: 54px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 30px;
            color: var(--gray);
            font-weight: 300;
        }

        /* Leaderboard */
        .leaderboard {
            background: rgba(26,26,58,0.8);
            border: 1px solid rgba(0,168,255,0.2);
            border-radius: 20px;
            padding: 28px 32px;
            backdrop-filter: blur(10px);
        }
        .lb-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--purple);
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank { width: 36px; font-size: 20px; }
        .lb-name { flex: 1; font-size: 24px; font-weight: 500; }
        .lb-score { font-size: 24px; font-weight: 700; color: var(--blue); }

        /* Status badge */
        #status-badge {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(138,43,226,0.2);
            border: 1px solid var(--purple);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--purple);
            width: fit-content;
        }
        #status-badge.show { display: flex; }

        /* Bottom bar */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to top, rgba(9,7,43,0.9), transparent);
        }
        #server-hint {
            font-size: 13px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
        }
        #connection-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #f44;
            box-shadow: 0 0 8px #f44;
            transition: background 0.4s, box-shadow 0.4s;
        }
        #connection-dot.connected { background: var(--blue); box-shadow: 0 0 8px var(--blue); }

        /* Transitions */
        .fade { opacity: 0; transition: opacity 0.6s; }
        .fade.in { opacity: 1; }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulsing { animation: pulse 2s infinite; }

        /* QR Code Overlay */
        #qr-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        #qr-overlay h2 {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 50px;
            color: var(--white);
            text-shadow: 0 0 30px rgba(0, 168, 255, 0.5);
        }
        .qr-box {
            background: var(--white);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 0 80px rgba(0, 168, 255, 0.5);
        }
        .qr-box img {
            width: 600px;
            height: 600px;
            border-radius: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div id="ambient"></div>

<!-- IDLE SCREEN -->
<div id="idle">
    <h1>QWIZZ</h1>
    <p class="pulsing">EN ATTENTE DE LA PARTIE...</p>
</div>

<!-- PLAYER SCREEN -->
<div id="player">
    <div id="cover-wrap">
        <img id="cover" src="" alt="pochette">
        <div id="cover-placeholder">🎵</div>
    </div>

    <div class="right">
        <span class="logo-text">QWIZZ</span>

        <div class="track-block">
            <div class="track-title" id="track-title">En attente...</div>
            <div class="track-artist" id="track-artist">Prêt à buzzer ?</div>
        </div>

        <div class="leaderboard">
            <div class="lb-title">🏆 Classement</div>
            <div id="lb-list">
                <div class="lb-row">
                    <span class="lb-rank">—</span>
                    <span class="lb-name">En attente des joueurs</span>
                    <span class="lb-score">—</span>
                </div>
            </div>
        </div>

        <div id="status-badge">🚫 JOUEUR BLOQUÉ</div>
    </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
    <span id="server-hint"></span>
    <div id="connection-dot"></div>
</div>

<div id="qr-overlay">
    <h2>REJOIGNEZ LA PARTIE !</h2>
    <div class="qr-box">
        <img id="qr-img" src="">
    </div>
</div>

<script>
// ── Cast Receiver Setup ──────────────────────────────────
const context = cast.framework.CastReceiverContext.getInstance();
const playerManager = context.getPlayerManager();

let socket = null;
let serverBase = null;
let reconnectTimer = null;

// Intercept media load to extract custom server URL
playerManager.setMessageInterceptor(
    cast.framework.messages.MessageType.LOAD,
    request => {
        const customData = request.media && request.media.customData;
        if (customData && customData.serverURL) {
            serverBase = customData.serverURL;
            document.getElementById('server-hint').textContent = 'Serveur: ' + serverBase;
            connectWebSocket(serverBase);
        }
        showPlayerScreen();
        return request;
    }
);

context.start({ disableIdleTimeout: true });

// ── WebSocket ────────────────────────────────────────────
function connectWebSocket(base) {
    const wsURL = base.replace('http://', 'ws://') + '/ws';
    clearTimeout(reconnectTimer);

    try {
        socket = new WebSocket(wsURL);
    } catch(e) {
        scheduleReconnect(base);
        return;
    }

    socket.onopen = () => {
        document.getElementById('connection-dot').classList.add('connected');
        socket.send(JSON.stringify({ type: 'identify', role: 'tv' }));
    };

    socket.onmessage = (evt) => {
        try {
            const data = JSON.parse(evt.data);
            handleMessage(data);
        } catch(e) {}
    };

    socket.onclose = () => {
        document.getElementById('connection-dot').classList.remove('connected');
        scheduleReconnect(base);
    };

    socket.onerror = () => {
        document.getElementById('connection-dot').classList.remove('connected');
    };
}

function scheduleReconnect(base) {
    reconnectTimer = setTimeout(() => connectWebSocket(base), 3000);
}

// ── Message handlers ─────────────────────────────────────
function handleMessage(data) {
    if (data.type === 'track_update') updateTrack(data);
    else if (data.type === 'leaderboard') updateLeaderboard(data.players);
    else if (data.type === 'state') updateState(data.state);
    else if (data.type === 'show_qr') toggleQR(data.show);
}

function updateTrack(data) {
    document.getElementById('track-title').textContent = data.title || '?';
    document.getElementById('track-artist').textContent = data.artist || '';

    const img = document.getElementById('cover');
    const ph = document.getElementById('cover-placeholder');

    if (data.cover && data.cover !== '') {
        img.onload = () => { img.style.display = 'block'; ph.style.display = 'none'; };
        img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
        img.src = data.cover;
    } else {
        img.style.display = 'none';
        ph.style.display = 'flex';
    }

    showPlayerScreen();
}

function updateLeaderboard(players) {
    if (!players || players.length === 0) {
        document.getElementById('lb-list').innerHTML =
            '<div class="lb-row"><span class="lb-rank">—</span><span class="lb-name">En attente des joueurs</span><span class="lb-score">—</span></div>';
        return;
    }

    const medals = ['🥇', '🥈', '🥉'];
    const top = [...players].sort((a, b) => b.score - a.score).slice(0, 5);

    document.getElementById('lb-list').innerHTML = top.map((p, i) => `
        <div class="lb-row">
            <span class="lb-rank">${medals[i] || (i+1)}</span>
            <span class="lb-name">${p.name}</span>
            <span class="lb-score">${p.score} pts</span>
        </div>`).join('');
}

function updateState(state) {
    const badge = document.getElementById('status-badge');
    badge.className = state === 'blocked' ? 'show' : '';
}

function toggleQR(show) {
    const qr = document.getElementById('qr-overlay');
    if (show && serverBase) {
        // Use serverBase directly from the Chromecast LOAD intercept
        const url = serverBase.replace('ws://', 'http://').replace('/ws', '');
        document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=' + encodeURIComponent(url) + '&bgcolor=ffffff&color=09072B&margin=0';
        qr.style.opacity = '1';
        qr.style.pointerEvents = 'auto';
    } else {
        qr.style.opacity = '0';
        qr.style.pointerEvents = 'none';
    }
}

// ── UI ───────────────────────────────────────────────────
function showPlayerScreen() {
    document.getElementById('idle').style.opacity = '0';
    document.getElementById('idle').style.pointerEvents = 'none';
    document.getElementById('player').style.opacity = '1';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>QWIZZ Master V5.3.6-Premium</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --glass: rgba(26, 26, 58, 0.85);
      --font: 'Outfit', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    /* Masquer le player natif Cast — notre UI personnalisée prend toute la place */
    cast-media-player {
      display: none !important;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: var(--font);
      overflow: hidden;
      font-size: 1.5vmin;
    }

    #ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 168, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(138, 43, 226, 0.08) 0%, transparent 40%),
        var(--bg);
    }

    /* Idle / Intro */
    #idle {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease-in-out;
    }

    #idle.gone {
      opacity: 0;
      pointer-events: none;
    }

    .idle-logo {
      width: 75vmin;
      filter: drop-shadow(0 0 50px rgba(0, 168, 255, 0.7));
      animation: pulseLogo 4s ease-in-out infinite;
    }

    .idle-status {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 1.5vmin;
      color: var(--blue);
      margin-top: 4vmin;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* Toast de rechargement */
    #reload-toast {
      position: fixed;
      bottom: 6vmin;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 168, 255, 0.15);
      border: 1.5px solid var(--blue);
      backdrop-filter: blur(10px);
      border-radius: 3vmin;
      padding: 2vmin 4vmin;
      font-size: 2rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.3vmin;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #reload-toast.show {
      opacity: 1;
    }

    /* Main Scene */
    #player-scene {
      position: fixed;
      inset: 0;
      z-index: 10;
      padding: 8vmin;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s;
    }

    #player-scene.visible {
      opacity: 1;
    }

    .main-grid {
      display: flex;
      align-items: center;
      gap: 8vmin;
      width: 100%;
      max-width: 170vmin;
    }

    .cover-side {
      position: relative;
      width: 62vmin;
      height: 62vmin;
      flex-shrink: 0;
    }

    .cover-card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 5vmin;
      overflow: hidden;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.9);
      border: 2.5px solid rgba(255, 255, 255, 0.15);
      background: linear-gradient(135deg, #1A1A3A 0%, #09072B 100%);
    }

    #img-main,
    #img-blur {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity .8s cubic-bezier(0.19, 1, 0.22, 1);
    }

    #img-main {
      z-index: 2;
    }

    #img-blur {
      z-index: 1;
      filter: blur(40px) brightness(0.7);
    }

    .track-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .track-title {
      font-size: 7rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 2vmin;
      text-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    }

    .track-artist {
      font-size: 3.5rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.1vmin;
    }

    /* Floating UI Elements */
    #leaderboard {
      position: fixed;
      z-index: 1000;
      display: none;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 168, 255, 0.3);
      border-radius: 5vmin;
      padding: 4vmin;
      box-shadow: 0 40px 130px rgba(0, 0, 0, 0.9);
    }

    #leaderboard.mode-full {
      inset: 8vmin;
      display: flex !important;
      flex-direction: column;
      justify-content: center;
    }

    #leaderboard.mode-br {
      bottom: 5vmin;
      right: 5vmin;
      width: 38vw;
      display: block !important;
      animation: slideUp .6s;
    }

    .lb-row {
      display: flex;
      align-items: center;
      height: 9vmin;
      padding: 2vmin 4vmin;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3vmin;
      margin-bottom: 1.5vmin;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .lb-rank {
      width: 6vmin;
      font-weight: 900;
      font-size: 3rem;
      color: var(--blue);
      opacity: 0.5;
    }

    .lb-name {
      flex: 1;
      font-weight: 700;
      font-size: 3.2rem;
      padding: 0 3vmin;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-score {
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--blue);
      min-width: 15vmin;
      text-align: right;
    }

    #qr-float {
      position: fixed;
      z-index: 2000;
      display: none;
      text-align: center;
      background: var(--glass);
      backdrop-filter: blur(15px);
      padding: 3.5vmin;
      border-radius: 5vmin;
      border: 2.5px solid var(--blue);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
    }

    #qr-float.visible {
      display: block;
      animation: popQR 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .qr-title {
      font-size: 2.4rem;
      font-weight: 900;
      margin-bottom: 2vmin;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.3vmin;
    }

    .qr-img {
      background: #fff;
      padding: 1.5vmin;
      border-radius: 2.5vmin;
      width: 22vmin;
      height: 22vmin;
      margin: 0 auto;
    }

    /* Transitions & Overlays */
    #overlay-layer {
      position: fixed;
      inset: 0;
      z-index: 50000;
      display: none;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #overlay-layer.active {
      display: flex;
      animation: fadeIn .5s;
    }

    /* Rules Overlay PREMIUM UX/UI */
    #rules-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(9, 7, 43, 0.95) 0%, var(--bg) 100%);
      backdrop-filter: blur(25px);
      z-index: 55000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6vmin;
    }

    #rules-overlay.active {
      display: flex;
      animation: zoomIn .5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes zoomIn {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    .rules-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 0 40px rgba(0, 168, 255, 0.05);
      border-radius: 5vmin;
      padding: 8vmin 10vmin;
      width: 100%;
      max-width: 140vmin;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .rules-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1vmin;
      background: linear-gradient(90deg, #00A8FF, #8A2BE2);
    }

    .rules-mode-badge {
      display: inline-block;
      background: rgba(0, 168, 255, 0.15);
      color: #00A8FF;
      border: 1px solid rgba(0, 168, 255, 0.3);
      padding: 1.5vmin 4vmin;
      border-radius: 4vmin;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.5vmin;
      text-transform: uppercase;
      margin-bottom: 5vmin;
      box-shadow: 0 0 30px rgba(0, 168, 255, 0.2);
    }

    .rules-title {
      font-size: 5.5rem;
      font-weight: 900;
      margin-bottom: 6vmin;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      background: linear-gradient(135deg, #fff 0%, #d0d0d0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .rules-text {
      font-size: 4rem;
      font-weight: 600;
      color: #E0E0E0;
      line-height: 1.4;
      margin-bottom: 8vmin;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .rules-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3vmin;
    }

    .rule-chip {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.15);
      padding: 2vmin 4vmin;
      border-radius: 3vmin;
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 2vmin;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    #podium-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 0 5vw;
      background: radial-gradient(circle at center, rgba(9, 7, 43, 0.85) 0%, rgba(9, 7, 43, 0.98) 100%);
      backdrop-filter: blur(30px);
      z-index: 55000;
    }

    #podium-wrap h1 {
      font-size: 8vh !important;
      text-shadow: 0 1vh 3vh rgba(0,0,0,0.8), 0 0 5vh rgba(0, 168, 255, 0.4);
      background: linear-gradient(135deg, #fff 0%, #00A8FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2vh !important;
      letter-spacing: 1vh;
      animation: dropDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes dropDown {
      0% { opacity: 0; transform: translateY(-5vh) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .podium-stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4vw;
      width: 100%;
      margin-top: 5vh;
      perspective: 1500px;
    }

    .podium-box {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4vh;
      padding: 5vh 3vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      transform: translateY(15vh) rotateX(-20deg) scale(0.9);
      min-width: 22vw;
      box-shadow: 0 4vh 12vh rgba(0,0,0,0.8), inset 0 0 4vh rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .podium-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1vh;
      background: rgba(255,255,255,0.2);
    }

    .podium-box.animate-in {
      opacity: 1;
      transform: translateY(0) rotateX(0) scale(1);
    }

    .rank-1 {
      height: 65vh;
      background: linear-gradient(160deg, rgba(0, 168, 255, 0.15) 0%, rgba(138, 43, 226, 0.15) 100%);
      border: 2px solid rgba(0, 168, 255, 0.6);
      z-index: 10;
      box-shadow: 0 10vh 35vh rgba(0, 168, 255, 0.4), inset 0 0 8vh rgba(0, 168, 255, 0.2);
      order: 2;
    }

    .rank-1::before {
      background: linear-gradient(90deg, #00A8FF, #8A2BE2);
      box-shadow: 0 0 4vh #00A8FF;
    }

    .rank-2 { height: 50vh; order: 1; border-top-color: #C0C0C0; }
    .rank-2::before { background: #C0C0C0; box-shadow: 0 0 3vh #C0C0C0; }
    
    .rank-3 { height: 42vh; order: 3; border-top-color: #CD7F32; }
    .rank-3::before { background: #CD7F32; box-shadow: 0 0 3vh #CD7F32; }

    .p-rank-label {
      font-size: 2.5vh;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.8vh;
      margin-bottom: 2vh;
    }

    .p-trophy {
      font-size: 10vh;
      margin-bottom: 2vh;
      filter: drop-shadow(0 2vh 3vh rgba(255,255,255,0.3));
      animation: floatTrophy 3s ease-in-out infinite;
    }

    @keyframes floatTrophy {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5vh); }
    }

    .p-name {
      font-size: 5vh;
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 2vh;
      text-transform: uppercase;
      letter-spacing: 0.2vh;
      text-shadow: 0 1vh 2vh rgba(0,0,0,0.5);
    }

    .p-score {
      font-size: 7vh;
      font-weight: 900;
      color: var(--blue);
      text-shadow: 0 0 4vh rgba(0, 168, 255, 0.6);
      margin-top: auto;
      background: rgba(0, 0, 0, 0.3);
      padding: 1vh 3vw;
      border-radius: 2vh;
      border: 1px solid rgba(0, 168, 255, 0.2);
    }

    .p-glow {
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 150%; height: 150%;
      background: radial-gradient(circle, rgba(0, 168, 255, 0.25) 0%, transparent 60%);
      z-index: -1;
      opacity: 0;
      transition: opacity 1.5s ease;
      animation: pulseGlow 4s linear infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    .rank-1 .p-glow { opacity: 1; }
    .rank-1 .p-name { font-size: 5.5vh; }
    .rank-1 .p-score { font-size: 8vh; }

    /* Utils */
    .pos-top-right {
      top: 4vmin;
      right: 4vmin;
    }

    .pos-top-left {
      top: 4vmin;
      left: 4vmin;
    }

    .pos-bottom-right {
      bottom: 4vmin;
      right: 4vmin;
    }

    .pos-bottom-left {
      bottom: 4vmin;
      left: 4vmin;
    }

    .pos-center {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    cast-media-player {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0;
      transition: opacity .6s;
    }

    body.video-active cast-media-player {
      opacity: 1;
      z-index: 100 !important;
    }

    /* QR Ticker bandeau défilant */
    #qr-ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2000;
      height: 9vmin;
      display: none;
      align-items: center;
      overflow: hidden;
      background: rgba(0, 168, 255, 0.12);
      border-top: 1.5px solid rgba(0, 168, 255, 0.4);
      backdrop-filter: blur(10px);
    }

    #qr-ticker.visible {
      display: flex;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: tickerScroll 28s linear infinite;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 2.5vmin;
      padding: 0 6vmin;
    }

    .ticker-qr {
      width: 6.5vmin;
      height: 6.5vmin;
      background: #fff;
      padding: 0.4vmin;
      border-radius: 0.8vmin;
      flex-shrink: 0;
    }

    .ticker-text {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.15vmin;
    }

    .ticker-sep {
      color: rgba(0, 168, 255, 0.4);
      font-size: 2rem;
      margin: 0 2vmin;
    }

    /* Animation Styles */
    .anim-fade .lb-row { animation: revealFade 0.6s ease-out both; }
    .anim-slide .lb-row { animation: revealSlide 0.6s cubic-bezier(0.19, 1, 0.22, 1) both; }
    .anim-pop .lb-row { animation: revealPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .anim-classic .lb-row { animation: none; }

    @keyframes revealFade {
      from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }
    @keyframes revealSlide {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes revealPop {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Rules overlay */
    #rules-overlay {
      position: fixed;
      inset: 0;
      z-index: 60000;
      background: rgba(9, 7, 43, 0.85); /* Slightly darker backdrop */
      backdrop-filter: blur(15px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #rules-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .rules-card {
      background: linear-gradient(145deg, rgba(26, 26, 58, 0.95), rgba(9, 7, 43, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4vh;
      padding: 5vh 8vh;
      max-width: 90vw;
      max-height: 90vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 6vh 15vh rgba(0, 0, 0, 0.95),
        inset 0 0 10vh rgba(0, 168, 255, 0.05);
      text-align: center;
      position: relative;
      overflow: hidden;
      transform: translateY(4vh) scale(0.95);
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .rules-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1vh;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      box-shadow: 0 0 3vh rgba(0, 168, 255, 0.8);
    }

    #rules-overlay.active .rules-card {
      transform: translateY(0) scale(1);
    }

    /* Pause overlay */
    #pause-overlay {
      position: fixed;
      inset: 0;
      z-index: 65000;
      background: rgba(9, 7, 43, 0.95);
      backdrop-filter: blur(15px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #pause-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .pause-card {
      background: var(--glass);
      border: 2px solid rgba(138, 43, 226, 0.4);
      border-radius: 4vh;
      padding: 6vh 8vh;
      max-width: 80vw;
      box-shadow: 0 6vh 15vh rgba(0, 0, 0, 0.9);
      text-align: center;
      transform: translateY(4vh) scale(0.95);
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #pause-overlay.active .pause-card {
      transform: translateY(0) scale(1);
    }

    .pause-title {
      font-size: 8vh;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4vh;
      color: #fff;
    }

    .pause-message {
      font-size: 4vh;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.55;
    }

    .rules-mode-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 168, 255, 0.15);
      border: 1.5px solid rgba(0, 168, 255, 0.4);
      border-radius: 4vh;
      padding: 1.2vh 4vh;
      font-size: 3vh;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5vh;
      text-transform: uppercase;
      margin-bottom: 3vh;
      box-shadow: 0 0 4vh rgba(0, 168, 255, 0.2);
    }

    .rules-title {
      font-size: 9vh;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 2vh;
      background: linear-gradient(135deg, #fff 30%, var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 1vh 2vh rgba(0, 0, 0, 0.5));
    }

    .rules-text {
      font-size: 4vh;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.5;
      margin: 0 auto 3vh auto;
      max-width: 90%;
    }
    
    .rules-text::after {
      content: '';
      display: block;
      width: 12vh;
      height: 0.4vh;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 1vh;
      margin: 3vh auto 0 auto;
    }

    .rules-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 2.5vh;
      justify-content: center;
    }

    .rules-chip {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2vh;
      padding: 2vh 3vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 20vh;
      box-shadow: 0 2vh 4vh rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }
    
    .rules-chip::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 0.6vh;
    }
    .rules-chip.chip-positive::before { background: var(--blue); box-shadow: 0 0 2vh var(--blue); }
    .rules-chip.chip-negative::before { background: #FF3B30; box-shadow: 0 0 2vh #FF3B30; }

    .chip-label {
      font-size: 2vh;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.2vh;
      margin-bottom: 0.5vh;
    }
    
    .chip-val {
      font-size: 4.5vh;
      font-weight: 900;
      line-height: 1;
    }
    
    .chip-positive .chip-val {
      color: var(--blue);
      text-shadow: 0 0 3vh rgba(0, 168, 255, 0.4);
    }
    .chip-negative .chip-val {
      color: #FF3B30;
      text-shadow: 0 0 3vh rgba(255, 59, 48, 0.4);
    }

    .rules-countdown {
      margin-top: 5vmin;
      width: 100%;
      height: 0.6vmin;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1vmin;
      overflow: hidden;
    }

    .rules-countdown-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 1vmin;
      animation: rulesCountdown var(--rules-duration, 8s) linear forwards;
    }

    @keyframes rulesCountdown {
      from {
        width: 100%;
      }

      to {
        width: 0%;
      }
    }

    @keyframes pulseLogo {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 50px rgba(0, 168, 255, 0.7));
      }

      50% {
        transform: scale(1.05);
        filter: drop-shadow(0 0 80px rgba(0, 168, 255, 0.9));
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes popQR {
      from {
        transform: scale(0.5) translateY(50px);
        opacity: 0;
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @keyframes tickerScroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* QCM Overlay */
    /* QCM Overlay PREMIUM UI */
    #qcm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(9, 7, 43, 0.9) 0%, var(--bg) 100%);
      backdrop-filter: blur(20px);
      z-index: 66000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6vmin;
      box-sizing: border-box;
      gap: 5vmin;
    }

    #qcm-overlay.visible { display: flex; animation: fadeIn .6s cubic-bezier(0.165, 0.84, 0.44, 1); }

    #qcm-timer-bar-wrap {
      width: 100%;
      height: 1.5vmin;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1vmin;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      position: absolute;
      top: 0; left: 0;
      border-radius: 0;
    }
    
    #qcm-timer-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00A8FF, #8A2BE2);
      transition: width 0.5s linear, background 0.5s;
      box-shadow: 0 0 20px rgba(0, 168, 255, 0.6);
    }

    #qcm-main {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: stretch;
      gap: 5vmin;
      padding-top: 3vmin;
    }

    /* Condition: with image -> flex-row */
    #qcm-main.with-image {
      flex-direction: row;
      align-items: center;
    }

    #qcm-side-image {
      display: none;
      width: 42vw;
      max-height: 75vh;
      object-fit: cover;
      border-radius: 4vmin;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 40px rgba(0, 168, 255, 0.15);
      border: 3px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    
    #qcm-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 5vmin;
      padding: 6vmin;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    
    #qcm-main.with-image #qcm-content {
      padding: 4vmin;
    }

    #qcm-question {
      font-size: 5.5rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      color: #fff;
      text-shadow: 0 10px 30px rgba(0,0,0,0.8);
      margin-bottom: 6vmin;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #qcm-main.with-image #qcm-question {
      font-size: 4.5rem; /* Réduire dynamiquement */
      margin-bottom: 4vmin;
    }

    #qcm-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3vmin;
      width: 100%;
      flex-shrink: 0;
    }

    #qcm-main.with-image #qcm-choices {
      grid-template-columns: 1fr; /* Stack vertically si image */
      gap: 2vmin;
    }

    .qcm-tv-btn {
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      border: 2px solid rgba(0, 168, 255, 0.15);
      border-radius: 2.5vmin;
      padding: 3.5vmin 4vmin;
      font-size: 3.5rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 3vmin;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    #qcm-main.with-image .qcm-tv-btn {
      padding: 2.5vmin 3.5vmin;
      font-size: 3rem;
    }

    .qcm-tv-btn .label {
      font-size: 2.8rem;
      font-weight: 900;
      color: #00A8FF;
      background: rgba(0, 168, 255, 0.1);
      width: 6vmin;
      height: 6vmin;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1.5vmin;
      margin-right: 1vmin;
      flex-shrink: 0;
    }

    .qcm-tv-btn.correct {
      background: linear-gradient(135deg, rgba(46, 213, 115, 0.3), rgba(46, 213, 115, 0.1));
      border-color: #2ed573;
      color: #fff;
      transform: scale(1.03);
      box-shadow: 0 0 60px rgba(46, 213, 115, 0.4), inset 0 0 20px rgba(46, 213, 115, 0.2);
    }
    
    .qcm-tv-btn.correct .label {
        background: #2ed573;
        color: #09072B;
    }

    .qcm-tv-btn.wrong {
      opacity: 0.2;
      filter: grayscale(100%);
      transform: scale(0.95);
    }

    .qcm-tv-btn .answer-count {
      margin-left: auto;
      font-size: 2.5rem;
      font-weight: 900;
      color: #09072B;
      background: #fff;
      padding: 1vmin 2vmin;
      border-radius: 1.5vmin;
      opacity: 0;
      transform: translateX(20px);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .qcm-tv-btn.results .answer-count {
        opacity: 1;
        transform: translateX(0);
    }

    #qcm-global-summary {
      display: none;
      flex-direction: row;
      gap: 5vmin;
      margin-top: 2vmin;
      justify-content: center;
      align-items: center;
      animation: slideUp .6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #qcm-global-summary.visible {
      display: flex;
    }

    .qcm-stat-badge {
      display: flex;
      align-items: center;
      gap: 2vmin;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4vmin;
      padding: 1.5vmin 4vmin;
      font-size: 3.5rem;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .stat-correct {
      color: #2ed573;
      border-color: rgba(46, 213, 115, 0.3);
      background: linear-gradient(135deg, rgba(46, 213, 115, 0.1), transparent);
    }

    .stat-wrong {
      color: #ff4757;
      border-color: rgba(255, 71, 87, 0.3);
      background: linear-gradient(135deg, rgba(255, 71, 87, 0.1), transparent);
    }

    .version-tag {
        position: fixed;
        bottom: 2vmin;
        left: 3vmin;
        font-size: 1.6rem;
        font-weight: 900;
        color: rgba(0, 168, 255, 0.2);
        z-index: 100000;
        letter-spacing: 0.2vmin;
        text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div id="ambient"></div>

  <div id="idle">
    <img id="logo-idle" class="idle-logo" src="https://qwizz.app/assets/img/logo.png">
    <div class="idle-status">PRÊT À QWIZZER ?</div>
  </div>

  <div id="player-scene">
    <div class="main-grid">
      <div class="cover-side">
        <div class="cover-card">
          <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:0">
            <img src="nocover.png" style="width:80%"></div>
          <img id="img-blur">
          <img id="img-main">
        </div>
      </div>
      <div class="track-info">
        <div class="track-title" id="t-title"></div>
        <div class="track-artist" id="t-artist"></div>
      </div>
    </div>
  </div>

  <div id="leaderboard">
    <div style="font-size:3.5rem; font-weight:900; color:var(--blue); letter-spacing:1vmin; margin-bottom:4vmin">🏆
      CLASSEMENT</div>
    <div id="lb-list" style="width:100%"></div>
  </div>

  <div id="qr-float" class="pos-top-right">
    <div class="qr-title">Rejoindre la partie</div>
    <div class="qr-img"><img id="img-qr" style="width:100%;height:100%;object-fit:contain"></div>
  </div>

  <div id="qr-ticker">
    <div class="ticker-track" id="ticker-inner"></div>
  </div>

  <div id="overlay-layer">
    <div id="cat-wrap" style="display:none; flex-direction:column; align-items:center">
      <h1 id="cat-name"
        style="font-size:12rem; font-weight:900; letter-spacing:6vmin; text-transform:uppercase; filter: drop-shadow(0 0 50px var(--blue))">
        CATEGORY</h1>
    </div>
    <div id="podium-wrap" style="display:none; flex-direction:column; align-items:center; width:100%">
      <h1 style="font-size:6rem; font-weight:900; color:var(--blue); text-transform:uppercase; margin-bottom:5vmin">CLASSEMENT FINAL</h1>
      <div id="podium-items" class="podium-stage"></div>
    </div>
  </div>

  <div id="rules-overlay">
    <div class="rules-card">
      <div class="rules-mode-badge" id="rules-mode"></div>
      <div class="rules-title">RÈGLES DU JEU</div>
      <div class="rules-text" id="rules-text"></div>
      <div class="rules-chips" id="rules-chips"></div>
    </div>
  </div>

  <div id="pause-overlay">
    <div class="pause-card">
      <div style="font-size:8rem; margin-bottom:4vmin;">⏸️</div>
      <div class="pause-title">JEU EN PAUSE</div>
      <div class="pause-message" id="pause-msg"></div>
    </div>
  </div>

  <div id="qcm-overlay">
    <div id="qcm-timer-bar-wrap">
      <div id="qcm-timer-bar"></div>
    </div>
    <div id="qcm-main">
      <img id="qcm-side-image" src="" alt="">
      <div id="qcm-content">
        <div id="qcm-question">Chargement...</div>
        <div id="qcm-choices"></div>
        <div id="qcm-global-summary">
          <div class="qcm-stat-badge stat-correct">✅ <span id="stat-correct-count">0</span></div>
          <div class="qcm-stat-badge stat-wrong">❌ <span id="stat-wrong-count">0</span></div>
        </div>
      </div>
    </div>
  </div>

  <div style="position:fixed; top:4vmin; right:6vmin; z-index:9999"><img id="logo-top" style="width:25vmin" src="https://qwizz.app/assets/img/logo.png"></div>
  <div class="version-tag">V5.5.0</div>
  <div id="reload-toast">⟳ &nbsp;Rechargement en cours...</div>
  <cast-media-player></cast-media-player>

  <script>
    // Master State V5.3.4 — base64 logo/QR + Mode QCM
    var STATE = {
      serverURL: '', track: null, revealed: false,
      showScores: false, scoreMode: 'br',
      showQR: false, qrURL: '', qrPos: 'top-right', qrDynamic: true,
      isPaused: false, pauseMessage: '',
      endGame: false, currentTrackID: null, currentCoverKey: null,
      logoBase64: null, qrBase64: null, hasBase64Logo: false,
      qcmDuration: 30, qcmCurrentQuestion: null
    };
    const _labels = ['A', 'B', 'C', 'D'];

    if (typeof cast === 'undefined' || !cast.framework) {
      document.body.innerHTML = '<div style="color:red;font-size:4vmin;padding:5vmin">ERREUR: Cast SDK non chargé</div>';
      throw new Error('Cast SDK unavailable');
    }

    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();

    function sync(d) {
      if (!d) return;
      if (typeof d === 'string') { try { d = JSON.parse(d); } catch (e) { return; } }
      
      console.log("Receiver Sync:", d.type || "state_update", d);

      if (d.type === 'reload') {
        var toast = document.getElementById('reload-toast');
        toast.classList.add('show');
        setTimeout(() => { window.location.reload(true); }, 600);
        return;
      }

      if (d.type === 'clear') {
        STATE.track = null; STATE.endGame = false; STATE.showQR = false; STATE.qrBase64 = null;
        if (window.poll) { clearInterval(window.poll); window.poll = null; }
        document.getElementById('idle').classList.remove('gone');
        document.getElementById('player-scene').classList.remove('visible');
        document.getElementById('overlay-layer').classList.remove('active');
        document.getElementById('rules-overlay').classList.remove('active');
        document.getElementById('qcm-overlay').classList.remove('visible');
        return;
      }

      if (d.serverURL) {
        STATE.serverURL = d.serverURL.endsWith('/') ? d.serverURL.slice(0, -1) : d.serverURL;
        if (!STATE.hasBase64Logo) {
          ['logo-idle', 'logo-top'].forEach(id => {
              var el = document.getElementById(id);
              if (el) el.src = STATE.serverURL + '/tv_logo?t=' + Date.now();
          });
        }
        if (!window.poll) window.poll = setInterval(() => { fetch(STATE.serverURL + '/tv_state').then(r => r.json()).then(sync).catch(() => { }) }, 500);
      }

      if (d.logoVersion !== undefined && d.logoVersion !== STATE.logoVersion) {
          STATE.logoVersion = d.logoVersion;
          STATE.serverURL = STATE.serverURL || (d.serverURL ? (d.serverURL.endsWith('/') ? d.serverURL.slice(0, -1) : d.serverURL) : null);
          if (STATE.serverURL) {
            ['logo-idle', 'logo-top'].forEach(id => {
                var el = document.getElementById(id);
                if (el) el.src = STATE.serverURL + '/tv_logo?v=' + STATE.logoVersion;
            });
          }
      } else if (d.logoBase64) {
        if (d.logoBase64 !== STATE.logoBase64) {
          STATE.hasBase64Logo = true;
          STATE.logoBase64 = d.logoBase64;
          ['logo-idle', 'logo-top'].forEach(id => {
              var el = document.getElementById(id);
              if (el) el.src = STATE.logoBase64;
          });
        }
      } else if (!STATE.hasBase64Logo && STATE.serverURL && !STATE.logoVersion) {
          STATE.hasBase64Logo = true;
          ['logo-idle', 'logo-top'].forEach(id => {
              var el = document.getElementById(id);
              if (el) el.src = STATE.serverURL + '/tv_logo?t=' + Date.now();
          });
      }

      // ── FUNDAMENTAL SETTINGS ────────────────────────────────────────────────
      if (d.showScores !== undefined) STATE.showScores = (d.showScores === true || d.showScores === "true");
      if (d.qrPosition && d.type !== 'show_qr') STATE.qrPos = d.qrPosition;
      if (d.scoreAnimationMode) STATE.scoreMode = d.scoreAnimationMode;

      // ── PRIORITY OVERLAYS (RANKING / TRANSITIONS) ───────────────────────────
      if (d.type === 'category_transition') { transition(d); return; }
      if (d.type === 'end_game') { podium(d.data); return; }
      else if (d.podiumData && !STATE.endGame && !d.qcmActive) { podium(d.podiumData); return; }
      else if (!d.podiumData && STATE.endGame) {
          STATE.endGame = false;
          document.getElementById('podium-wrap').style.display = 'none';
          document.querySelectorAll('.premium-entry').forEach(el => el.classList.remove('animate-in'));
      }

      // ── QCM MODE logic ──────────────────────────────────────────────────────
      try {
        if (d.type === 'qcm_question' || (d.qcmActive && d.question && !d.isQCMRevealed)) {
          STATE.qcmDuration = d.duration || STATE.qcmDuration || 30;
          STATE.qcmImageURL = d.imageURL || null;
          
          var qText = d.question || document.getElementById('qcm-question').textContent || '';
          
          if (STATE.qcmCurrentQuestion !== qText || d.type === 'qcm_question') {
            STATE.qcmCurrentQuestion = qText;
            document.getElementById('qcm-question').textContent = qText;
            
            var choicesEl = document.getElementById('qcm-choices');
            var rawChoices = d.choices || [];
            
            // CLEANUP: Reset image and results state for new question
            var sideImg = document.getElementById('qcm-side-image');
            var mainEl = document.getElementById('qcm-main');
            sideImg.src = '';
            sideImg.style.display = 'none';
            mainEl.classList.remove('with-image');
            document.getElementById('qcm-global-summary').classList.remove('visible');

            if (rawChoices.length > 0) {
              choicesEl.innerHTML = rawChoices.map((c, i) =>
                '<div class="qcm-tv-btn" id="qcm-choice-' + i + '">'
                + '<span class="label">' + (_labels[i] || (i + 1)) + '</span>'
                + '<span>' + c + '</span>'
                + '<span class="answer-count" id="qcm-count-' + i + '"></span>'
                + '</div>'
              ).join('');
            }
          }
          
          var bar = document.getElementById('qcm-timer-bar');
          if (d.type === 'qcm_question') {
            bar.style.transition = 'none'; bar.style.width = '100%';
            bar.style.background = 'linear-gradient(90deg, #00A8FF, #8A2BE2)';
            bar.offsetHeight; // force reflow
            bar.style.transition = 'width ' + STATE.qcmDuration + 's linear';
            bar.style.width = '0%';
          } else if (d.remaining !== undefined) {
            var colorPct = (d.remaining / STATE.qcmDuration) * 100;
            // Only restart transition if we are just starting or out of sync
            if (bar.style.width === '' || bar.style.width === '100%') {
                bar.style.transition = 'none';
                bar.style.width = colorPct + '%';
                bar.offsetHeight;
                bar.style.transition = 'width ' + d.remaining + 's linear';
                bar.style.width = '0%';
            }
            if (colorPct < 30) bar.style.background = 'linear-gradient(90deg,#ff1744,#ff6d00)';
            else if (colorPct < 60) bar.style.background = 'linear-gradient(90deg,#ff6d00,#ffea00)';
            else bar.style.background = 'linear-gradient(90deg, #00A8FF, #8A2BE2)';
          }
          
          document.getElementById('idle').classList.add('gone');
          document.getElementById('qcm-overlay').classList.add('visible');
          document.getElementById('rules-overlay').classList.remove('active');
          
          applyUI(d);
          return;

        } else if (d.type === 'qcm_timer') {
          var remaining = d.remaining;
          var bar = document.getElementById('qcm-timer-bar');
          var colorPct = (remaining / STATE.qcmDuration) * 100;
          if (bar.style.width === '' || bar.style.width === '100%') {
              bar.style.transition = 'none';
              bar.style.width = colorPct + '%';
              bar.offsetHeight;
              bar.style.transition = 'width ' + remaining + 's linear';
              bar.style.width = '0%';
          }
          if (colorPct < 30) bar.style.background = 'linear-gradient(90deg,#ff1744,#ff6d00)';
          else if (colorPct < 60) bar.style.background = 'linear-gradient(90deg,#ff6d00,#ffea00)';
          return;

        } else if (d.type === 'qcm_reveal' || (d.qcmActive && d.isQCMRevealed)) {
          var correct = d.correctIndex;
          var answers = d.answers || {};
          var imgURL = d.imageURL || STATE.qcmImageURL;
          
          if (imgURL) {
            var sideImg = document.getElementById('qcm-side-image');
            var mainEl = document.getElementById('qcm-main');
            sideImg.src = imgURL;
            sideImg.style.display = 'block';
            mainEl.classList.add('with-image');
          }

          var counts = {};
          var ansValues = Object.values(answers);
          var totalCorrect = 0, totalWrong = 0;

          for (var k = 0; k < ansValues.length; k++) { 
            var idx = ansValues[k];
            counts[idx] = (counts[idx] || 0) + 1; 
            if (idx === correct) totalCorrect++; else totalWrong++;
          }
          
          document.querySelectorAll('.qcm-tv-btn').forEach(function(btn, i) {
            if (i === correct) btn.classList.add('correct');
            else btn.classList.add('wrong');
            btn.classList.add('results');
            var countEl = document.getElementById('qcm-count-' + i);
            if (countEl) countEl.textContent = (counts[i] || 0) + '👤';
          });

          var summaryEl = document.getElementById('qcm-global-summary');
          if (summaryEl) {
            document.getElementById('stat-correct-count').textContent = totalCorrect;
            document.getElementById('stat-wrong-count').textContent = totalWrong;
            summaryEl.classList.add('visible');
          }
          
          document.getElementById('qcm-timer-bar').style.transition = 'none';
          document.getElementById('idle').classList.add('gone');
          document.getElementById('qcm-overlay').classList.add('visible');
          applyUI(d);
          return;

        } else if (d.type === 'qcm_stop') {
          document.getElementById('qcm-overlay').classList.remove('visible');
          document.getElementById('qcm-choices').innerHTML = '';
          var si = document.getElementById('qcm-side-image');
          si.style.display = 'none'; si.src = '';
        }
      } catch (err) { console.error("QCM Process Error:", err); }

      // ── TRACK ───────────────────────────────────────────────────────────────
      if (d.type === 'cover_update' && d.coverBase64) {
        if (d.trackID === STATE.currentTrackID || !STATE.currentTrackID) applyCover(d.coverBase64);
      }

      if (d.type === 'track_update' || d.trackID || (d.track && d.track.trackID)) render(d.track || d);
      if (d.type === 'reveal' || d.gameState === 'revealed' || d.reveal === true) doReveal();

      // ── QR CODE ─────────────────────────────────────────────────────────────
      if (d.type === 'show_qr') {
        STATE.showQR = d.show;
        if (d.url) STATE.qrURL = d.url;
        if (d.position) STATE.qrPos = d.position;
        if (d.dynamic !== undefined) STATE.qrDynamic = d.dynamic;
        if (d.qrBase64) { STATE.qrBase64 = d.qrBase64; }
      } else if (d.showQR !== undefined) {
        STATE.showQR = (d.showQR === true || d.showQR === "true");
        if (d.qrBase64) STATE.qrBase64 = d.qrBase64;
        if (d.qrPosition) STATE.qrPos = d.qrPosition;
        if (d.qrVersion !== undefined && d.qrVersion !== STATE.qrVersion) {
            STATE.qrVersion = d.qrVersion;
            // The QR code is usually base64 in d.qrBase64 or fetched via /qr
        }
      }

      // ── UI CONFIG ───────────────────────────────────────────────────────────
      if (d.type === 'appearance' && d.data) {
        if (d.data.showScores !== undefined) STATE.showScores = (d.data.showScores === true || d.data.showScores === "true");
        if (d.data.qrPosition) STATE.qrPos = d.data.qrPosition;
        if (d.data.scoreAnimationMode) STATE.scoreMode = d.data.scoreAnimationMode;
        if (d.data.scoreRevealAnimation) STATE.scoreRevealAnimation = d.data.scoreRevealAnimation;
        if (d.data.qrCodeDynamicPositioning !== undefined) STATE.qrDynamic = d.data.qrCodeDynamicPositioning;
      }

      // ── PAUSE ───────────────────────────────────────────────────────────────
      if (d.type === 'isPaused') {
        STATE.isPaused = d.data;
        if (d.pauseMessage) STATE.pauseMessage = d.pauseMessage;
      } else if (d.isPaused !== undefined) {
        STATE.isPaused = d.isPaused;
        if (d.pauseMessage !== undefined) STATE.pauseMessage = d.pauseMessage;
      }

      applyUI(d);

      // ── RULES ──────────────────────────────────────────────────────────────
      if (d.type === 'mode_switch') {
        showRules(d);
      } else if (d.type === 'hide_rules') {
        document.getElementById('rules-overlay').classList.remove('active');
      } else if (d.rulesVisible !== undefined) {
        var rulesOverlay = document.getElementById('rules-overlay');
        if (d.rulesVisible && d.rules) {
          if (!rulesOverlay.classList.contains('active')) showRules(d);
        } else if (!d.rulesVisible) {
          rulesOverlay.classList.remove('active');
        }
      }
    }

    function render(t) {
      if (!t || !t.trackID) return;
      if (STATE.endGame) return; 
      
      var isNewTrack = (t.trackID !== STATE.currentTrackID);
      STATE.track = t;
      STATE.currentTrackID = t.trackID;
      STATE.revealed = (t.gameState === 'revealed' || t.reveal === true);

      document.getElementById('idle').classList.add('gone');
      document.getElementById('player-scene').classList.add('visible');
      document.body.classList.remove('video-active');

      document.getElementById('t-title').textContent = STATE.revealed ? (t.title || "") : "QUEL EST LE TITRE ?";
      document.getElementById('t-artist').textContent = STATE.revealed ? (t.artist || "") : "???";

      if (isNewTrack) {
        // Reset images for new track to avoid ghosting
        var i = document.getElementById('img-main'), b = document.getElementById('img-blur');
        i.style.opacity = '0'; b.style.opacity = '0';
        i.removeAttribute('src'); b.removeAttribute('src');
        STATE.currentCoverKey = null;
      }

      // Résoudre la source cover
      var rawCover = t.cover || t.coverURL || null;
      var coverSrc = null;
      if (rawCover && !rawCover.includes('no_cover')) {
        coverSrc = rawCover.startsWith('http') ? rawCover : (STATE.serverURL + rawCover);
        coverSrc = coverSrc.replace(/[?&]t=\d+/g, '');
      }
      var coverKey = t.trackID + '|' + (coverSrc || 'nocover');

      if (coverKey !== STATE.currentCoverKey) {
        STATE.currentCoverKey = coverKey;
        var i = document.getElementById('img-main'), b = document.getElementById('img-blur');
        if (coverSrc) {
          b.src = coverSrc; b.onload = () => { if (STATE.track.shouldBlur && !STATE.revealed) b.style.opacity = '1'; };
          i.src = coverSrc; if (STATE.revealed) { i.style.opacity = '1'; b.style.opacity = '0'; }
        }
      }
      
      // Priorité Base64 si disponible
      if (t.coverBase64) {
          applyCover(t.coverBase64);
      }

      if (STATE.revealed) doReveal();
    }

    function applyCover(base64) {
      var i = document.getElementById('img-main'), b = document.getElementById('img-blur');
      if (!base64) return;
      if (STATE.track && STATE.track.shouldBlur && !STATE.revealed) {
        b.src = base64; b.style.opacity = '1';
      } else {
        i.src = base64; i.style.opacity = '1'; b.style.opacity = '0';
      }
    }

    function doReveal() {
      if (!STATE.track) return;
      STATE.revealed = true;
      document.getElementById('t-title').textContent = STATE.track.title || "";
      document.getElementById('t-artist').textContent = STATE.track.artist || "";
      var i = document.getElementById('img-main'), b = document.getElementById('img-blur');
      if (i.src && i.src.length > 5 && !i.src.includes('nocover')) { i.style.opacity = '1'; b.style.opacity = '0' }
      if (STATE.track.isVideo) document.body.classList.add('video-active');
    }

    function applyUI(d) {
      // Classement — affiché/masqué selon showScores
      var lb = document.getElementById('leaderboard');
      if (STATE.showScores) {
        var animClass = 'anim-' + (STATE.scoreRevealAnimation || 'fade');
        var newClassName = (STATE.scoreMode === 'full' ? 'mode-full ' : 'mode-br ') + animClass;
        if (lb.className !== newClassName) lb.className = newClassName;
        lb.style.display = STATE.scoreMode === 'full' ? 'flex' : 'block';
        
        if (d && d.players) {
          var s = d.players.sort((a, b) => b.score - a.score).slice(0, 8);
          var html = s.map((p, idx) => {
            var delay = (idx * 0.15).toFixed(2) + 's';
            return `<div class="lb-row" style="animation-delay: ${delay}"><span class="lb-rank">${idx + 1}</span><span class="lb-name">${p.name}</span><span class="lb-score">${p.score} pts</span></div>`;
          }).join('');
          
          var listEl = document.getElementById('lb-list');
          if (listEl.innerHTML !== html) listEl.innerHTML = html; // Simple check to avoid flicker
        }
      } else { 
        if (lb.style.display !== 'none') {
            lb.className = ''; 
            lb.style.display = 'none'; 
        }
      }

      // QR Code — mode flottant (sans piste) ou bandeau défilant (piste en cours)
      var qr = document.getElementById('qr-float');
      var ticker = document.getElementById('qr-ticker');
      if (STATE.showQR && (STATE.serverURL || STATE.qrBase64)) {
        var qrSrc = STATE.qrBase64 || (STATE.serverURL + '/qr_code?t=' + Date.now());
        
        if (STATE.track && STATE.qrDynamic) {
          // Bandeau défilant en bas
          qr.classList.remove('visible'); qr.style.display = 'none';
          var item = '<div class="ticker-item"><img class="ticker-qr" src="' + qrSrc + '"><span class="ticker-text">SCANNER & JOUER</span><span class="ticker-sep">◆</span></div>';
          var tickerInner = document.getElementById('ticker-inner');
          if (tickerInner.innerHTML !== (item + item)) tickerInner.innerHTML = item + item;
          ticker.classList.add('visible');
        } else {
          // QR flottant classique
          ticker.classList.remove('visible');
          var newQrClass = 'visible pos-' + STATE.qrPos;
          if (qr.className !== newQrClass) qr.className = newQrClass;
          var qrImg = document.getElementById('img-qr');
          if (qrImg.src !== qrSrc) qrImg.src = qrSrc;
          qr.style.display = 'block';
        }
      } else {
        qr.classList.remove('visible'); qr.style.display = 'none';
        ticker.classList.remove('visible');
      }

      // Pause Mode
      var pauseOver = document.getElementById('pause-overlay');
      if (STATE.isPaused) {
        if (!pauseOver.classList.contains('active')) pauseOver.classList.add('active');
        var msgEl = document.getElementById('pause-msg');
        if (msgEl.textContent !== STATE.pauseMessage) msgEl.textContent = STATE.pauseMessage || "";
      } else {
        if (pauseOver.classList.contains('active')) pauseOver.classList.remove('active');
      }
    }


    function transition(d) {
      document.getElementById('cat-name').textContent = d.name;
      document.getElementById('overlay-layer').classList.add('active');
      document.getElementById('cat-wrap').style.display = 'flex';
      document.getElementById('podium-wrap').style.display = 'none';
      setTimeout(() => document.getElementById('overlay-layer').classList.remove('active'), (d.duration || 4) * 1000);
    }

    function podium(data) {
      STATE.endGame = true;
      var top3 = data.sort((a, b) => b.score - a.score).slice(0, 3);
      var medals = ["🥇", "🥈", "🥉"];
      var ranks = ["1st", "2nd", "3rd"]; 
      
      // We want to display them in order 2, 1, 3 for visual podium look
      var podiumOrder = [];
      if (top3.length > 1) podiumOrder.push({ p: top3[1], r: 2 });
      if (top3.length > 0) podiumOrder.push({ p: top3[0], r: 1 });
      if (top3.length > 2) podiumOrder.push({ p: top3[2], r: 3 });
      
      document.getElementById('podium-items').innerHTML = podiumOrder.map(item => {
        var p = item.p;
        var r = item.r;
        return `
          <div class="podium-box rank-${r} premium-entry">
            <div class="p-rank-label">${ranks[r-1]}</div>
            <div class="p-trophy">${medals[r-1]}</div>
            <div class="p-name">${p.name}</div>
            <div class="p-score">${p.score} <span style="font-size:1.5rem;opacity:0.6">PTS</span></div>
            <div class="p-glow"></div>
          </div>
        `;
      }).join('');
      
      document.getElementById('overlay-layer').classList.add('active');
      document.getElementById('podium-wrap').style.display = 'flex';
      document.getElementById('cat-wrap').style.display = 'none';
      
      // Trigger confetti if possible or just a nice CSS scale
      setTimeout(() => {
          document.querySelectorAll('.premium-entry').forEach((el, i) => {
              el.style.animationDelay = (i * 0.3) + "s";
              el.classList.add('animate-in');
          });
      }, 100);
    }

    function showRules(d) {
      console.log('Mode Switch Received:', d);
      var overlay = document.getElementById('rules-overlay');

      // textContent is safer than innerText for hidden elements in legacy browsers
      document.getElementById('rules-mode').textContent = d.mode || 'Classique';
      document.getElementById('rules-text').textContent = d.rules || '';

      // Chips : points, pénalité, timer
      var chips = [];
      if (d.points !== undefined) chips.push({ label: 'Bonne réponse', val: '+' + d.points + ' pts', color: true });
      if (d.wrong && d.wrong < 0) chips.push({ label: 'Mauvaise réponse', val: d.wrong + ' pts', color: false });
      else if (d.wrong) chips.push({ label: 'Pénalité', val: '-' + d.wrong + ' pts', color: false });
      if (d.timer && d.timer > 0) chips.push({ label: 'Temps / réponse', val: d.timer + 's', color: true });
      if (d.speed) chips.push({ label: 'Bonus vitesse', val: 'Activé', color: true });
      if (d.streak) chips.push({ label: 'Bonus série', val: 'Activé', color: true });
      
      var chipsHTML = chips.map(c => {
        var cls = c.color ? 'chip-positive' : 'chip-negative';
        return '<div class="rules-chip ' + cls + '"><div class="chip-label">' + c.label + '</div><div class="chip-val">' + c.val + '</div></div>';
      }).join('');
      document.getElementById('rules-chips').innerHTML = chipsHTML;

      overlay.classList.add('active');
    }

    // Intercepter le chargement média pour récupérer l'URL du serveur
    pm.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, req => {
      if (req.media && req.media.customData) sync(req.media.customData);
      // Sortir de l'écran idle dès qu'un média est chargé, même sans trackID complet
      document.getElementById('idle').classList.add('gone');
      document.getElementById('player-scene').classList.add('visible');
      return req;
    });

    // start() en premier — certaines versions récentes du CAF SDK l'exigent avant addCustomMessageListener
    // customNamespaces déclaré dans les options (obligatoire dans les versions récentes)
    try {
      var msgType = (cast.framework.system && cast.framework.system.MessageType)
        ? cast.framework.system.MessageType.STRING
        : 'string';
      ctx.start({
        disableIdleTimeout: true,
        maxInactivity: 3600,
        customNamespaces: { 'urn:x-cast:com.qwizz.control': msgType }
      });
      ctx.addCustomMessageListener('urn:x-cast:com.qwizz.control', function(e) { sync(e.data); });
    } catch(e) {
      console.error('QWIZZ receiver init error:', e);
      document.body.innerHTML = '<div style="color:red;font-size:3vmin;padding:5vmin;font-family:monospace">ERREUR INIT:<br>' + e.message + '</div>';
    }

    // Empêcher la TV de passer en veille via la Screen Wake Lock API
    async function keepAwake() {
      if (!navigator.wakeLock) return;
      try {
        await navigator.wakeLock.request('screen');
      } catch (e) { }
    }
    keepAwake();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') keepAwake();
    });
  </script>
</body>

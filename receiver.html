  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --font: 'Outfit', sans-serif;
      --qr-size: 22vmin;
    }

    * { margin: 0; padding: 0; box-sizing: border-box }

    body, html {
      width: 100%; height: 100%;
      background: var(--bg); color: #fff;
      font-family: var(--font); overflow: hidden;
      font-size: 1.5vmin
    }

    #ambient {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0, 168, 255, .15) 0%, transparent 70%), 
                  radial-gradient(ellipse 40% 40% at 80% 20%, rgba(138, 43, 226, .12) 0%, transparent 70%);
      pointer-events: none; z-index: 0
    }

    #splash {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3vmin; z-index: 10000; transition: opacity 1s ease
    }

    #splash.hidden { opacity: 0; pointer-events: none; }

    #idle {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      z-index: 100; transition: opacity .8s ease
    }

    #idle.gone { opacity: 0; pointer-events: none }

    .idle-content {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      animation: fadeInUp 1.2s ease-out
    }

    .idle-logo {
      width: 85vmin; height: auto; margin-bottom: 4vmin;
      filter: drop-shadow(0 0 80px rgba(0, 168, 255, 0.7));
    }

    #player {
      position: fixed; inset: 0;
      display: grid; grid-template-columns: 45vw 1fr;
      padding: 8vmin; gap: 8vmin; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity .8s; z-index: 10
    }

    #player.visible { opacity: 1 }

    .cover-wrapper {
      position: relative; width: 60vmin; height: 60vmin;
      border-radius: 4vmin; overflow: hidden;
      border: 0.4vmin solid rgba(255, 255, 255, .15);
      box-shadow: 0 40px 120px rgba(0, 0, 0, .8);
      background: rgba(0, 0, 0, 0.4)
    }

    #cover, #cover-blurred {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
    }

    #cover { z-index: 2; }
    #cover-blurred { z-index: 1; filter: blur(35px) brightness(0.7); }

    cast-media-player {
      position: fixed; inset: 0; z-index: 5;
      opacity: 0; transition: opacity 0.8s;
      --theme-hue: 200; background: var(--bg);
    }

    body.video-revealed cast-media-player { opacity: 1; z-index: 100 !important; }

    #cover-placeholder {
      position: absolute; inset: 0; border-radius: 3vmin;
      border: 2px dashed rgba(0, 168, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 25rem; color: rgba(0, 168, 255, .15); z-index: 0
    }

    .logo-area { position: fixed; top: 4vmin; right: 6vmin; z-index: 9999 }
    .logo-area img { width: 25vmin; height: auto; object-fit: contain; filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.6)) }

    .track-info { transition: opacity 0.6s ease; opacity: 0; }
    .track-info.revealed { opacity: 1; }
    .track-title { font-size: 6rem; font-weight: 900; line-height: 1.1; margin-bottom: 2rem; text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6) }
    .track-artist { font-size: 3rem; color: #E0E0E0; font-weight: 300; opacity: 0.9; }

    #leaderboard {
      position: fixed; background: rgba(15, 12, 45, 0.92);
      border: 1px solid rgba(0, 168, 255, 0.25);
      border-radius: 4vmin; padding: 5vmin;
      backdrop-filter: blur(40px); z-index: 9000;
      display: none; box-shadow: 0 50px 150px rgba(0,0,0,0.8);
    }

    #leaderboard.mode-full {
      inset: 8vmin; display: flex; flex-direction: column;
      justify-content: center; align-items: center
    }

    #leaderboard.mode-bottom-right {
      bottom: 5vmin; right: 5vmin; width: 35vw; display: block
    }

    .lb-header {
        font-weight: 900; letter-spacing: 0.5vmin; color: var(--blue);
        text-transform: uppercase; margin-bottom: 4vmin; font-size: 3.5rem;
        text-align: center; border-bottom: 1px solid rgba(0,168,255,0.1); padding-bottom: 2vmin;
    }

    .lb-row {
      display: flex; align-items: center; gap: 3vmin;
      background: rgba(255, 255, 255, 0.03); padding: 2vmin 3vmin;
      border-radius: 2vmin; margin-bottom: 1.5vmin; opacity: 0;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .lb-row.active { opacity: 1; transform: translateX(0); }

    .lb-rank { width: 6vmin; font-weight: 900; font-size: 2.5rem; text-align: center; color: rgba(255,255,255,0.4); }
    .lb-name { flex: 1; font-weight: 700; font-size: 2.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 900; color: var(--blue); font-size: 2.8rem; font-family: 'Outfit', sans-serif; }

    /* Rank Colors */
    .lb-row.rank-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05)); border-color: rgba(255, 215, 0, 0.3); }
    .lb-row.rank-1 .lb-rank { color: #FFD700; transform: scale(1.2); }
    .lb-row.rank-1 .lb-score { color: #FFD700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

    .lb-row.rank-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.12), rgba(192, 192, 192, 0.03)); border-color: rgba(192, 192, 192, 0.25); }
    .lb-row.rank-2 .lb-rank { color: #C0C0C0; }

    .lb-row.rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1), rgba(205, 127, 50, 0.02)); border-color: rgba(205, 127, 50, 0.2); }
    .lb-row.rank-3 .lb-rank { color: #CD7F32; }

    .lb-row.cheater { background: rgba(255, 0, 0, 0.1); border-color: rgba(255, 0, 0, 0.3); }

    #qr-overlay {
      position: fixed; z-index: 10000; display: none;
      background: rgba(15, 12, 45, 0.96); backdrop-filter: blur(25px);
      padding: 4vmin; border-radius: 5vmin; border: 2px solid var(--blue);
      text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7)
    }

    #qr-img { width: var(--qr-size); height: var(--qr-size); background: #fff; padding: 1.5vmin; border-radius: 2vmin; }

    #pause-overlay, #rules-overlay, #category-overlay {
      position: fixed; inset: 0; background: rgba(9, 7, 43, 0.98);
      backdrop-filter: blur(50px); display: none; flex-direction: column;
      align-items: center; justify-content: center; z-index: 8000;
      text-align: center; padding: 5vmin;
    }

    #pause-overlay.visible, #rules-overlay.visible, #category-overlay.visible { display: flex; }

    .category-card { animation: zoomIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .category-image {
      width: 50vmin; height: 50vmin; border-radius: 5vmin;
      object-fit: cover; border: 4px solid var(--blue);
      box-shadow: 0 0 100px rgba(0, 168, 255, 0.5); margin-bottom: 5vmin;
    }

    #cheater-overlay {
      position: fixed; inset: 0; background: rgba(9, 7, 43, 0.85);
      z-index: 100000; display: none; align-items: center;
      justify-content: center; backdrop-filter: blur(10px);
    }

    #cheater-overlay.visible { display: flex; }

    .cheater-card {
      background: #1A1A3A; border: 0.8vmin solid #ff4b2b;
      padding: 8vmin 15vmin; border-radius: 4vmin;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 0 10vmin rgba(255, 75, 43, 0.5);
      animation: popIn .6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }

    #debug-log {
      position: fixed; bottom: 2vmin; left: 2vmin; z-index: 100000;
      background: rgba(0, 0, 0, 0.7); color: #0f0; font-family: monospace;
      font-size: 1.2vmin; padding: 1vmin; border-radius: 1vmin;
      max-width: 40vw; max-height: 20vh; overflow-y: auto;
      pointer-events: none; display: none;
    }
  </style>
</head>

<body>
  <div id="ambient"></div>
  <div id="splash">
    <h1 style="font-size:7rem;color:var(--blue);font-weight:900;letter-spacing:2vmin">QWIZZ</h1>
    <div style="width:6vmin;height:6vmin;border:0.6vmin solid rgba(0,168,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:rotate 1.2s linear infinite;margin-top:3vmin"></div>
    <p id="splash-status" style="font-size:1.8rem;opacity:0.6;margin-top:3vmin">Initialisation...</p>
  </div>

  <div id="idle">
    <div class="idle-content">
      <img id="idle-logo" class="idle-logo">
      <div style="font-size:8rem;font-weight:900;letter-spacing:2vmin;color:var(--blue)">PRÊT À QWIZZER ?</div>
      <div style="font-size:2.5rem;color:rgba(255,255,255,.4);margin-top:3vmin">En attente du début de la partie...</div>
    </div>
  </div>

  <div id="player">
    <div style="display:flex;align-items:center;justify-content:center">
      <div class="cover-wrapper">
        <div id="cover-placeholder">?</div>
        <img id="cover-blurred">
        <img id="cover">
      </div>
    </div>
    <div class="track-info" id="track-info-container">
      <div class="track-title" id="track-title"></div>
      <div class="track-artist" id="track-artist"></div>
    </div>
  </div>

  <div id="leaderboard" class="mode-bottom-right">
    <div class="lb-header">🏆 Classement</div>
    <div id="lb-list" style="width:100%"></div>
  </div>

  <div id="qr-overlay" style="top:4vmin; right:4vmin;">
    <div style="font-size:2.5rem;color:var(--blue);font-weight:900;margin-bottom:2vmin">REJOINDRE LE JEU</div>
    <img id="qr-img">
  </div>

  <div id="pause-overlay"><h1>PAUSE</h1><div id="pause-msg" style="font-size:3.5rem;max-width:80vw;line-height:1.4"></div></div>
  <div id="rules-overlay"><div class="rules-card"><h1 id="rules-mode" style="font-size:6rem;font-weight:900;color:var(--blue);text-transform:uppercase;margin-bottom:2vmin;">MODE</h1><p id="rules-text" style="font-size:3rem;line-height:1.4;"></p></div></div>
  <div id="category-overlay"><div class="category-card"><img id="category-img" class="category-image" style="display:none"><h1 id="category-name-display" style="font-size:9rem;font-weight:900;text-transform:uppercase;letter-spacing:2vmin">CATEGORY</h1></div></div>

  <div id="cheater-overlay">
    <div class="cheater-card">
      <div style="color:#ff4b2b;font-size:4rem;font-weight:900;letter-spacing:2vmin;margin-bottom:4vmin">ALERTE TRICHE</div>
      <div id="cheater-name-text" style="font-size:10rem;font-weight:900;color:white;margin-bottom:2vmin">PLAYER</div>
      <div style="font-size:3rem;color:rgba(255,255,255,0.6);text-transform:uppercase">Sanction confirmée</div>
      <div id="cheater-penalty-text" style="background:#ff4b2b;color:white;font-size:6rem;font-weight:900;padding:2vmin 6vmin;border-radius:2vmin;margin-top:6vmin">-50 PTS</div>
    </div>
  </div>

  <div class="logo-area" id="main-logo-wrap"><img id="logo-img"></div>
  <cast-media-player></cast-media-player>
  <div id="debug-log"></div>

  <script>
    var serverURL = '';
    var lastCategoryTime = 0;
    var lastTrackId = null;
    var isRevealed = false;
    
    function log(m) {
      console.log(m);
      var l = document.getElementById('debug-log');
      if(l) {
        var d = document.createElement('div');
        d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + m;
        l.appendChild(d);
        l.scrollTop = l.scrollHeight;
      }
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    function initS(u) {
      if(!u || u === serverURL) return;
      serverURL = (u.endsWith('/') ? u.slice(0,-1) : u);
      log("SYNC SERVER: " + serverURL);
      document.getElementById('splash').classList.add('hidden');
      ['logo-img', 'idle-logo'].forEach(id => {
        var el = document.getElementById(id);
        if(el) el.src = serverURL + '/tv_logo?t=' + Date.now();
      });
      startPoll();
    }

    function handle(d) {
      if(!d) return;
      log("RECV MESSAGE: " + (d.type || d.gameState || "raw"));
      
      if(d.players) renderLB(d.players);
      if(d.track) updateT(d.track);
      if(d.type === 'reveal' || d.reveal === true || d.gameState === 'revealed') revealInfo();
      if(d.isPaused !== undefined) toggleP(d.isPaused, d.pauseMessage);
      if(d.showScores !== undefined) applyA({showScores: d.showScores, scoreAnimationMode: d.scoreAnimationMode});
      if(d.showQR !== undefined) toggleQR(d.showQR, d.qrURL);
      
      // Event based
      if(d.type === 'track_update') updateT(d);
      else if(d.type === 'leaderboard') renderLB(d.players);
      else if(d.type === 'show_qr') toggleQR(d.show, d.url);
      else if(d.type === 'category_transition' && d.timestamp > lastCategoryTime) {
        lastCategoryTime = d.timestamp;
        showCat(d);
      }
      else if(d.type === 'cheater_alert') showCheater(d);
    }

    function updateT(d) {
      if(!d || !d.trackID) {
        lastTrackId = null;
        document.getElementById('idle').classList.remove('gone');
        document.getElementById('player').classList.remove('visible');
        return;
      }
      
      // If same track, just check if we need to reveal it now
      if(d.trackID === lastTrackId) {
          if (d.gameState === 'revealed') revealInfo();
          return;
      }
      
      lastTrackId = d.trackID;
      isRevealed = false;
      document.getElementById('track-info-container').classList.remove('revealed');
      
      document.getElementById('idle').classList.add('gone');
      document.getElementById('player').classList.add('visible');
      document.body.classList.remove('video-revealed');
      document.getElementById('category-overlay').classList.remove('visible');
      
      // Metadata always hidden initially
      document.getElementById('track-title').textContent = d.title || "";
      document.getElementById('track-artist').textContent = d.artist || "";
      
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred'), p = document.getElementById('cover-placeholder');
      if(d.cover) {
        var src = (d.cover.startsWith('http') ? d.cover : serverURL + d.cover) + '&t=' + Date.now();
        
        // Blurred is shown immediately if requested
        b.src = src; b.onload = () => { if(!isRevealed) b.style.opacity = '1'; p.style.display = 'none'; };
        
        // Clear cover is loaded but hidden initially
        i.src = src; i.style.opacity = '0';
        
        // If not blurring, but also not revealed, show NOTHING (placeholder) until reveal
        if(!d.shouldBlur && d.gameState !== 'revealed') {
            b.style.opacity = '0';
            p.style.display = 'flex';
        }
      } else {
        p.style.display = 'flex'; i.style.opacity = '0'; b.style.opacity = '0';
      }
      
      if(d.gameState === 'revealed') revealInfo();
    }

    function revealInfo() {
      if(isRevealed) return;
      isRevealed = true;
      log("REVEALING TRACK INFO");
      document.getElementById('track-info-container').classList.add('revealed');
      document.body.classList.add('video-revealed');
      
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred'), p = document.getElementById('cover-placeholder');
      if(i) i.style.opacity = '1';
      if(b) b.style.opacity = '0';
      if(p) p.style.display = 'none';
    }

    function renderLB(players) {
      var l = document.getElementById('lb-list');
      var s = players.sort((a,b) => b.score - a.score).slice(0, 8);
      
      l.innerHTML = s.map((p, idx) => `
        <div class="lb-row active rank-${idx+1} ${p.isCheating ? 'cheater' : ''}" style="transition-delay: ${idx * 0.05}s">
          <span class="lb-rank">${idx+1}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-score">${p.score} pts</span>
        </div>
      `).join('');
    }

    function showCat(d) {
      document.getElementById('category-name-display').textContent = d.name;
      var i = document.getElementById('category-img');
      if(d.hasImage && d.imageURL) {
        i.src = (d.imageURL.startsWith('http') ? d.imageURL : serverURL + d.imageURL) + '?t=' + Date.now();
        i.style.display = 'block';
      } else i.style.display = 'none';
      document.getElementById('category-overlay').classList.add('visible');
      if(d.duration) setTimeout(() => document.getElementById('category-overlay').classList.remove('visible'), d.duration * 1000);
    }

    function toggleP(p, m) {
      var o = document.getElementById('pause-overlay');
      if(p) { o.classList.add('visible'); document.getElementById('pause-msg').textContent = m || ""; }
      else o.classList.remove('visible');
    }

    function toggleQR(show, url) {
      var q = document.getElementById('qr-overlay');
      if(show) {
        document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url || serverURL);
        q.classList.add('visible');
      } else q.classList.remove('visible');
    }

    function showCheater(d) {
      var o = document.getElementById('cheater-overlay');
      document.getElementById('cheater-name-text').textContent = d.name;
      document.getElementById('cheater-penalty-text').textContent = '-' + (d.penalty || 50) + ' PTS';
      o.classList.add('visible');
      setTimeout(() => o.classList.remove('visible'), 6000);
    }

    function applyA(d) {
      var lb = document.getElementById('leaderboard');
      if(d.showScores) lb.style.display = (d.scoreAnimationMode === 'bottom-right' ? 'block' : 'flex');
      else lb.style.display = 'none';
    }

    function startPoll() {
      if(window.pollTimer) clearInterval(window.pollTimer);
      window.pollTimer = setInterval(() => {
        if(!serverURL) return;
        fetch(serverURL + '/tv_state').then(r => r.json()).then(handle).catch(()=>{});
      }, 5000);
    }

    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, req => {
      log("LOAD RECEIVED");
      if(req.media && req.media.customData && req.media.customData.serverURL) initS(req.media.customData.serverURL);
      return req;
    });

    context.addCustomMessageListener('urn:x-cast:com.qwizz.control', e => handle(e.data));
    
    const options = new cast.framework.CastReceiverOptions();
    options.maxInactivity = 86400;
    context.start(options);
    log("Receiver Started V5.0.2-Recovery-Premium");
  </script>
</body>
</html>
</html>

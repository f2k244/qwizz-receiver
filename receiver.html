<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QWIZZ Cast Receiver V5.0.2</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --font: 'Outfit', sans-serif;
      --qr-size: 22vmin;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: var(--font);
      overflow: hidden;
      font-size: 1.5vmin
    }

    #ambient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0, 168, 255, .12) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 80% 20%, rgba(138, 43, 226, .10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3vmin;
      z-index: 10000;
      transition: opacity 1s ease
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash h1 {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: 1.5vmin;
      color: var(--blue);
      text-shadow: 0 0 40px rgba(0, 168, 255, .4);
      display: none
    }

    #splash-logo {
      width: 80vmin;
      height: auto;
      filter: drop-shadow(0 0 60px rgba(0, 168, 255, 0.7));
      display: none
    }

    #idle {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity .8s ease
    }

    #idle.gone {
      opacity: 0;
      pointer-events: none
    }

    .idle-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeInUp 1.2s ease-out
    }

    .idle-logo {
      width: 85vmin;
      height: auto;
      margin-bottom: 4vmin;
      filter: drop-shadow(0 0 80px rgba(0, 168, 255, 0.7));
      display: none
    }

    .idle-title {
      font-size: 7rem;
      font-weight: 900;
      letter-spacing: 1.5vmin;
      color: var(--blue);
      text-shadow: 0 0 60px rgba(0, 168, 255, 0.4);
      display: none
    }

    #player {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 40vw 1fr;
      padding: 8vmin;
      gap: 8vmin;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s;
      z-index: 10
    }

    #player.visible {
      opacity: 1
    }

    .cover-wrapper {
      position: relative;
      width: 55vmin;
      height: 55vmin;
      border-radius: 3vmin;
      overflow: hidden;
      border: 0.3vmin solid rgba(255, 255, 255, .2);
      box-shadow: 0 40px 100px rgba(0, 0, 0, .7);
      background: rgba(0, 0, 0, 0.3)
    }

    #cover,
    #cover-blurred {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      opacity: 0;
    }

    #cover {
      z-index: 2;
    }

    #cover-blurred {
      z-index: 1;
      filter: blur(25px) brightness(0.8);
    }

    cast-media-player {
        position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.8s;
        --theme-hue: 200;
    }
    body.video-revealed cast-media-player {
        opacity: 1; z-index: 100 !important;
    }

    #cover-placeholder {
      position: absolute;
      inset: 0;
      border-radius: 2.5vmin;
      border: 2px dashed rgba(0, 168, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20rem;
      color: rgba(0, 168, 255, .2);
      z-index: 0
    }

    .logo-area {
      position: fixed;
      top: 4vmin;
      right: 6vmin;
      z-index: 9999
    }

    .logo-area img {
      width: 25vmin;
      height: auto;
      object-fit: contain;
      display: none;
      filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5))
    }

    .track-title {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5)
    }

    .track-artist {
      font-size: 2.5rem;
      color: #E0E0E0;
      font-weight: 300
    }

    #leaderboard {
      position: fixed;
      background: rgba(26, 26, 58, .95);
      border: 1px solid rgba(0, 168, 255, .3);
      border-radius: 3vmin;
      padding: 4vmin;
      backdrop-filter: blur(30px);
      z-index: 9000;
      display: none
    }

    #leaderboard.mode-full {
      inset: 8vmin;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center
    }

    #leaderboard.mode-bottom-right {
      bottom: 4vmin;
      right: 4vmin;
      width: 30vw;
      display: block
    }

    #leaderboard.hidden {
      display: none !important;
    }

    .lb-title {
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 3vmin;
      font-size: 2.5rem
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 2vmin;
      background: rgba(255, 255, 255, .05);
      padding: 1.5vmin 2vmin;
      border-radius: 1.5vmin;
      margin-bottom: 1vmin;
      opacity: 0
    }

    .lb-rank {
      width: 5vmin;
      font-weight: 900;
      font-size: 2rem;
      text-align: center
    }

    .lb-name {
      flex: 1;
      font-weight: 700;
      font-size: 2rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .lb-score {
      font-weight: 900;
      color: var(--blue);
      font-size: 2rem
    }

    .lb-row.cheater {
      background: rgba(255, 0, 0, 0.15);
      border: 1px solid rgba(255, 0, 0, 0.4)
    }

    #qr-overlay {
      position: fixed;
      z-index: 10000;
      display: none;
      background: rgba(26, 26, 58, 0.98);
      backdrop-filter: blur(20px);
      padding: 3vmin;
      border-radius: 4vmin;
      border: 1px solid var(--blue);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6)
    }

    #qr-overlay.visible {
      display: flex !important;
      flex-direction: column;
      align-items: center;
      gap: 2vmin
    }

    #qr-overlay.pos-center {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%)
    }

    #qr-overlay.pos-bottom-right {
      bottom: 4vmin;
      right: 4vmin
    }

    #qr-overlay.pos-bottom-left {
      bottom: 4vmin;
      left: 4vmin
    }

    #qr-overlay.pos-top-right {
      top: 4vmin;
      right: 4vmin
    }

    #qr-overlay.pos-top-left {
      top: 4vmin;
      left: 4vmin
    }

    #qr-img {
      width: var(--qr-size);
      height: var(--qr-size);
      background: #fff;
      padding: 1.5vmin;
      border-radius: 2vmin
    }

    #pause-overlay,
    #rules-overlay,
    #category-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9, 7, 43, 0.98);
      backdrop-filter: blur(40px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8000;
      text-align: center;
      padding: 5vmin;
    }

    #pause-overlay.visible,
    #rules-overlay.visible,
    #category-overlay.visible {
      display: flex;
    }

    #pause-overlay h1 {
      font-size: 8rem;
      color: var(--blue);
      font-weight: 900;
      letter-spacing: 2vmin;
      margin-bottom: 4vmin
    }

    .rules-card,
    .category-card {
      background: rgba(26, 26, 58, 0.8);
      border: 2px solid var(--blue);
      border-radius: 4vmin;
      padding: 6vmin;
      max-width: 80vw;
      box-shadow: 0 0 100px rgba(0, 168, 255, 0.2);
      animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .rules-mode-name {
      font-size: 5rem;
      font-weight: 900;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 2vmin;
      letter-spacing: 1vmin;
    }

    .rules-description {
      font-size: 2.5rem;
      line-height: 1.4;
      color: white;
      opacity: 0.9;
      font-weight: 400;
    }

    .category-image {
      width: 45vmin;
      height: 45vmin;
      border-radius: 4vmin;
      object-fit: cover;
      border: 3px solid var(--blue);
      box-shadow: 0 0 80px rgba(0, 168, 255, 0.4);
      margin-bottom: 4vmin;
    }

    .category-name-big {
      font-size: 8rem;
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1.5vmin;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
    }

    #podium-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9500;
      padding: 6vmin
    }

    #podium-overlay.visible {
      display: flex
    }

    #podium-title {
      font-size: 5.5rem;
      font-weight: 900;
      color: var(--blue);
      letter-spacing: 1.5vmin;
      text-transform: uppercase;
      margin-bottom: 4vmin;
      text-align: center
    }

    .podium-container {
      display: flex;
      align-items: flex-end;
      gap: 5vmin;
      margin-top: 8vmin
    }

    .podium-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2vmin;
      animation: fadeInUp 1s cubic-bezier(0.34, 1.56, 0.64, 1) backwards
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes rotate {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes zoomIn {
      0% {
        opacity: 0;
        transform: scale(.3) rotate(-6deg)
      }

      65% {
        transform: scale(1.08) rotate(1deg)
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0)
      }
    }

    @keyframes suspenseIn {
      0% {
        opacity: 0;
        transform: translateX(-60px);
        filter: blur(6px)
      }

      60% {
        filter: blur(0)
      }

      100% {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes cascadeIn {
      0% {
        opacity: 0;
        transform: translateY(-40px) scaleY(.6)
      }

      70% {
        transform: translateY(4px)
      }

      100% {
        opacity: 1;
        transform: translateY(0) scaleY(1)
      }
    }

    @keyframes wipeIn {
      from {
        opacity: 1;
        clip-path: inset(0 100% 0 0 round 1.5vmin)
      }

      to {
        opacity: 1;
        clip-path: inset(0 0% 0 0 round 1.5vmin)
      }
    }

    @keyframes neonFadeIn {
      from {
        opacity: 0;
        filter: brightness(4) blur(2px)
      }

      to {
        opacity: 1;
        filter: brightness(1)
      }
    }

    .anim-suspense {
      animation: suspenseIn .7s forwards
    }

    .anim-cascade {
      animation: cascadeIn .45s forwards
    }

    .anim-wipe {
      animation: wipeIn .5s ease forwards
    }

    .anim-neon {
      animation: neonFadeIn .7s ease forwards
    }

    #cheater-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(9, 7, 43, 0.85);
      z-index: 100000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      animation: fadeIn .5s forwards
    }

    #cheater-overlay.visible {
      display: flex
    }

    .cheater-card {
      background: #1A1A3A;
      border: 0.8vmin solid #ff4b2b;
      padding: 8vmin 15vmin;
      border-radius: 4vmin;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 0 10vmin rgba(255, 75, 43, 0.4);
      transform: scale(0);
      animation: popIn .6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      position: relative;
      overflow: hidden
    }

    .cheater-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1vmin;
      background: linear-gradient(90deg, transparent, #ff4b2b, transparent);
      animation: scan 2s linear infinite
    }

    .cheater-header {
      color: #ff4b2b;
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 2vmin;
      margin-bottom: 4vmin
    }

    .cheater-name-big {
      font-size: 9rem;
      font-weight: 900;
      color: white;
      margin-bottom: 2vmin;
      text-shadow: 0 0 3vmin rgba(255, 255, 255, 0.3)
    }

    .cheater-info {
      font-size: 3rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.5vmin
    }

    .cheater-penalty-badge {
      background: #ff4b2b;
      color: white;
      font-size: 5rem;
      font-weight: 900;
      padding: 2vmin 6vmin;
      border-radius: 2vmin;
      margin-top: 6vmin;
      box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4)
    }

    /* Styles Variations */
    #cheater-overlay.style-defilement {
      background: linear-gradient(90deg, #b40000, #ff1a1a);
      height: 10vmin;
      top: 0;
      bottom: auto;
      flex-direction: row;
      justify-content: flex-start;
      padding: 0;
      border: none;
      border-bottom: 0.8vmin solid #ffcc00;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      z-index: 200000;
      overflow: hidden;
      backdrop-filter: none
    }

    #cheater-overlay.style-defilement .cheater-card {
      background: transparent;
      border: none;
      box-shadow: none;
      flex-direction: row;
      width: 100%;
      height: 100%;
      padding: 0;
      transform: none;
      animation: slideDown .5s ease forwards;
      align-items: center;
      justify-content: flex-start
    }

    .ticker-badge {
      background: #ffcc00;
      color: black;
      font-size: 2.8vmin;
      font-weight: 900;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 4vmin;
      margin: 0;
      letter-spacing: 0.3vmin;
      z-index: 2;
      box-shadow: 10px 0 25px rgba(0, 0, 0, 0.4);
      gap: 1.5vmin;
      flex-shrink: 0
    }

    .ticker-dot {
      width: 1.5vmin;
      height: 1.5vmin;
      background: #b40000;
      border-radius: 50%;
      animation: pulseDot .8s infinite alternate
    }

    #cheater-overlay.style-defilement .cheater-name-big {
      font-size: 4.5vmin;
      font-weight: 800;
      margin: 0;
      white-space: nowrap;
      animation: marqueePremium 12s linear infinite;
      padding-left: 100%;
      flex: 1;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      will-change: transform
    }

    #cheater-overlay.style-defilement .cheater-info,
    #cheater-overlay.style-defilement .cheater-penalty-badge,
    #cheater-overlay.style-defilement .cheater-header {
      display: none
    }

    @keyframes marqueePremium {
      0% {
        transform: translate3d(0, 0, 0)
      }

      100% {
        transform: translate3d(-250%, 0, 0)
      }
    }

    @keyframes pulseDot {
      from {
        opacity: 0.3;
        transform: scale(0.8)
      }

      to {
        opacity: 1;
        transform: scale(1.1)
      }
    }

    @keyframes slideDown {
      from {
        transform: translate3d(0, -100%, 0)
      }

      to {
        transform: translate3d(0, 0, 0)
      }
    }

    #cheater-overlay.style-glitch .cheater-card {
      background: black;
      border-color: cyan;
      animation: glitchAnim .2s infinite
    }

    #cheater-overlay.style-glitch .cheater-header {
      color: magenta;
      text-shadow: 2px 0 red, -2px 0 blue
    }

    @keyframes glitchAnim {
      0% {
        transform: translate(2px, 2px)
      }

      25% {
        transform: translate(-2px, -2px)
      }

      50% {
        transform: translate(-2px, 2px)
      }

      75% {
        transform: translate(2px, -2px)
      }

      100% {
        transform: translate(0)
      }
    }

    #cheater-overlay.style-notification {
      background: transparent;
      backdrop-filter: none;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 4vmin
    }

    #cheater-overlay.style-notification .cheater-card {
      width: 50vmin;
      padding: 4vmin;
      transform: translateX(60vmin);
      animation: notifIn .5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards
    }

    @keyframes notifIn {
      to {
        transform: translateX(0)
      }
    }

    #cheater-overlay.style-pulsation {
      background: rgba(255, 0, 0, 0.2);
      animation: pulseRed 1s infinite alternate
    }

    @keyframes pulseRed {
      from {
        box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.3)
      }

      to {
        box-shadow: inset 0 0 250px rgba(255, 0, 0, 0.8)
      }
    }

    #cheater-overlay.style-danger {
      background: repeating-linear-gradient(45deg, #000, #000 4vmin, #ffcc00 4vmin, #ffcc00 8vmin);
      padding: 4vmin
    }

    #cheater-overlay.style-danger .cheater-card {
      background: #000;
      border: 1vmin solid #ffcc00
    }

    #cheater-overlay.style-danger .cheater-header {
      color: #ffcc00
    }

    #cheater-overlay.style-danger .cheater-penalty-badge {
      background: #ffcc00;
      color: #000
    }

    #cheater-overlay.style-cinema {
      background: transparent;
      backdrop-filter: none;
    }

    #cheater-overlay.style-cinema::before,
    #cheater-overlay.style-cinema::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      height: 15vh;
      background: #000;
      z-index: 100001;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #cheater-overlay.style-cinema::before {
      top: 0;
      transform: translateY(-100%);
    }

    #cheater-overlay.style-cinema::after {
      bottom: 0;
      transform: translateY(100%);
    }

    #cheater-overlay.style-cinema.visible::before,
    #cheater-overlay.style-cinema.visible::after {
      transform: translateY(0);
    }

    #cheater-overlay.style-cinema .cheater-card {
      border: none;
      background: rgba(26, 26, 58, 0.95);
      box-shadow: 0 0 100px rgba(255, 0, 0, 0.5);
    }

    #cheater-overlay.style-flash-classement {
      background: transparent;
      backdrop-filter: none;
    }

    #cheater-overlay.style-flash-classement.visible~#leaderboard {
      animation: flashRed 0.5s infinite;
    }

    @keyframes flashRed {

      0%,
      100% {
        background: rgba(26, 26, 58, .95);
      }

      50% {
        background: rgba(255, 0, 0, 0.8);
        transform: scale(1.02);
      }
    }

    @keyframes popIn {
      from {
        transform: scale(0.8);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes scan {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(100%)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    cast-media-player {
      position: fixed;
      inset: 0;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.8s ease;
      --theme-hue: 200;
      background: var(--bg);
    }

    body.video-revealed cast-media-player {
      opacity: 1;
      z-index: 100 !important;
    }

    body.video-revealed #player {
      display: none !important;
    }

    body.video-revealed #ambient {
      display: none !important;
    }

    #media-element {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    #category-persistent.visible {
      opacity: 1;
    }

    #debug-log {
      position: fixed;
      bottom: 2vmin;
      left: 2vmin;
      z-index: 100000;
      background: rgba(0, 0, 0, 0.7);
      color: #0f0;
      font-family: monospace;
      font-size: 1.2vmin;
      padding: 1vmin;
      border-radius: 1vmin;
      max-width: 40vw;
      max-height: 20vh;
      overflow-y: auto;
      pointer-events: none;
      display: none;
    }
  </style>
</head>

<body>
  <div id="ambient"></div>
  <div id="splash">
    <h1 id="splash-text">QWIZZ</h1>
    <img id="splash-logo">
    <div
      style="width:5vmin;height:5vmin;border:0.5vmin solid rgba(0,168,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:rotate 1s linear infinite;margin-top:2vmin">
    </div>
    <p id="splash-status" style="font-size:1.5rem;opacity:0.6;margin-top:2vmin">Connexion...</p>
  </div>
  <div id="idle">
    <div class="idle-content">
      <img id="idle-logo" class="idle-logo">
      <div class="idle-title" id="idle-title-text" style="display:block">PRÊT À QWIZZER ?</div>
      <div class="idle-sub" style="font-size:2rem;color:rgba(255,255,255,.4);margin-top:2rem">En attente du début de la
        partie...</div>
    </div>
  </div>
  <div id="player">
    <div style="display:flex;align-items:center;justify-content:center">
      <div class="cover-wrapper">
        <div id="cover-placeholder">?</div>
        <img id="cover-blurred">
        <img id="cover">
      </div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center">
      <div class="track-title" id="track-title"></div>
      <div class="track-artist" id="track-artist"></div>
    </div>
  </div>
  <div id="leaderboard" class="mode-full hidden">
    <div class="lb-title">🏆 Classement</div>
    <div id="lb-list" style="width:100%"></div>
  </div>
  <div id="qr-overlay">
    <div style="font-size:2rem;color:var(--blue);font-weight:900;margin-bottom:1.5vmin">Scanner pour Rejoindre</div><img
      id="qr-img">
  </div>
  <div id="pause-overlay">
    <h1>PAUSE</h1>
    <div id="pause-msg" style="font-size:3rem;max-width:80vw;line-height:1.4"></div>
  </div>
  <div id="rules-overlay">
    <div class="rules-card">
      <h1 id="rules-mode" class="rules-mode-name">MODE</h1>
      <p id="rules-text" class="rules-description"></p>
    </div>
  </div>
  <div id="category-overlay">
    <div class="category-card">
      <img id="category-img" class="category-image" style="display:none">
      <h1 id="category-name-display" class="category-name-big">CATEGORY</h1>
    </div>
  </div>
  <div id="podium-overlay">
    <div class="logo-area" style="display:block"><img id="podium-logo"></div>
    <h1 id="podium-title">CLASSEMENT FINAL</h1>
    <div class="podium-container" id="podium-steps"></div>
  </div>
  <div id="cheater-overlay">
    <div class="cheater-card">
      <div class="cheater-header">ALERTE TRICHE</div>
      <div id="cheater-name-text" class="cheater-name-big">PLAYER</div>
      <div class="cheater-info">Sanction confirmée</div>
      <div id="cheater-penalty-text" class="cheater-penalty-badge">-50 PTS</div>
    </div>
  </div>
  <div id="category-persistent"></div>
  <div class="logo-area hidden" id="main-logo-wrap"><img id="logo-img"></div>
  <cast-media-player></cast-media-player>
  <div id="debug-log"><  <script>
    // --- QWIZZ EXPERT STATE MACHINE V6.0.0 ---
    var serverURL = '';
    var lastCategoryTime = Date.now();
    var lastTrackId = null;
    var currentState = {
      track: null,
      players: [],
      isPaused: false,
      qr: { show: false, url: '' },
      mute: false,
      showScores: false,
      scoreMode: 'bottom-right',
      podium: null,
      category: null
    };

    function log(m) {
      var l = document.getElementById('debug-log');
      if (!l) return;
      var d = document.createElement('div');
      d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + m;
      l.appendChild(d);
      l.scrollTop = l.scrollHeight;
      console.log(m);
    }

    log("Expert Engine Initializing...");

    var ctx = cast.framework.CastReceiverContext.getInstance();
    var playerManager = ctx.getPlayerManager();

    function initS(u) {
      if (!u || u === serverURL) return;
      serverURL = u;
      log("SYNC SERVER: " + u);
      document.getElementById('splash').classList.add('hidden');
      var ids = ['logo-img', 'idle-logo', 'splash-logo', 'podium-logo'];
      for (var i = 0; i < ids.length; i++) {
        var el = document.getElementById(ids[i]);
        if (el) el.src = u + '/tv_logo?t=' + Date.now();
      }
      startPoll();
    }

    function handle(d) {
      if (!d) return;
      // 1. Snapshot handling (Poll)
      if (d.players) renderLB(d.players);
      if (d.track) updateT(d.track);
      if (d.isPaused !== undefined) toggleP(d.isPaused, d.pauseMessage);
      if (d.mute !== undefined) setMute(d.mute);
      if (d.showScores !== undefined) applyA({showScores: d.showScores, scoreAnimationMode: d.scoreAnimationMode});

      // 2. Discrete Events (Push)
      var t = d.type;
      if (t === 'track_update') updateT(d);
      else if (t === 'leaderboard') renderLB(d.players);
      else if (t === 'show_qr') toggleQR(d.show, d.url);
      else if (t === 'isPaused') toggleP(d.data, d.pauseMessage);
      else if (t === 'end_game') showPodium(d.data);
      else if (t === 'appearance') applyA(d.data);
      else if (t === 'cheater_alert') showCheater(d);
      else if (t === 'category_transition' || d.category_event) {
        var ev = d.category_event || d;
        if (ev.timestamp > lastCategoryTime) {
          lastCategoryTime = ev.timestamp;
          showCat(ev);
        }
      }

      if (d.reveal === true) revealCover();
    }

    function updateT(d) {
      if (!d || !d.trackID) {
         if (lastTrackId) {
             lastTrackId = null;
             document.getElementById('idle').classList.remove('gone');
             document.getElementById('player').classList.remove('visible');
         }
         return;
      }
      if (d.trackID === lastTrackId && d.shouldBlur === (currentState.track ? currentState.track.shouldBlur : null)) return;

      log("TRACK: " + d.title);
      lastTrackId = d.trackID;
      currentState.track = d;

      // Close overlays that should be hidden on new track
      document.getElementById('category-overlay').classList.remove('visible');
      document.body.classList.remove('video-revealed');
      document.getElementById('idle').classList.add('gone');
      document.getElementById('player').classList.add('visible');
      document.getElementById('main-logo-wrap').classList.remove('hidden');

      document.getElementById('track-title').textContent = d.title || "";
      document.getElementById('track-artist').textContent = d.artist || "";

      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred'), p = document.getElementById('cover-placeholder');
      if (d.cover) {
        var base = d.cover.indexOf('http') === 0 ? d.cover : (serverURL + d.cover);
        var src = base + (base.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
        if (d.shouldBlur) {
          if (b) { b.src = src; b.onload = function () { b.style.opacity = '1'; p.style.display = 'none'; }; }
          if (i) i.style.opacity = '0';
        } else {
          if (i) { i.src = src; i.onload = function () { i.style.opacity = '1'; p.style.display = 'none'; }; }
          if (b) b.style.opacity = '0';
        }
      } else {
        p.style.display = 'flex';
        if (i) i.style.opacity = '0'; if (b) b.style.opacity = '0';
      }
    }

    function revealCover() {
      log("ACTION: REVEAL");
      document.body.classList.add('video-revealed');
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred');
      if (i && currentState.track && currentState.track.cover_clear) {
        var base = currentState.track.cover_clear.indexOf('http') === 0 ? currentState.track.cover_clear : (serverURL + currentState.track.cover_clear);
        i.src = base + (base.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
        i.style.opacity = '1';
        if (b) b.style.opacity = '0';
        i.style.transform = 'scale(1.05)';
        setTimeout(function () { i.style.transform = 'scale(1)'; }, 300);
      }
    }

    function setMute(m) {
      log("MUTE: " + m);
      ctx.setSystemMuted(m);
      if (playerManager) {
          var el = playerManager.getMediaElement();
          if (el) { el.muted = m; el.volume = m ? 0 : 1; }
      }
    }

    function toggleQR(show, url) {
      log("QR: " + show);
      var q = document.getElementById('qr-overlay');
      if (show) {
        document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url || serverURL);
        q.classList.add('visible');
      } else q.classList.remove('visible');
    }

    function renderLB(players) {
      var l = document.getElementById('lb-list');
      if (!l) return;
      var s = players.sort(function (a, b) { return b.score - a.score }).slice(0, 10);
      l.innerHTML = s.map(function (p, idx) {
        var isC = p.isCheating;
        return '<div class="lb-row ' + (isC ? 'cheater' : '') + '" style="opacity:1"><span class="lb-rank">' + (idx + 1) + '</span><span class="lb-name">' + esc(p.name) + '</span><span class="lb-score">' + p.score + ' pts</span></div>';
      }).join('');
    }

    function showCat(ev) {
      log("CAT: " + ev.name);
      var o = document.getElementById('category-overlay'), i = document.getElementById('category-img'), n = document.getElementById('category-name-display');
      n.textContent = ev.name;
      n.style.display = ev.showName === false ? 'none' : 'block';
      if (ev.hasImage && ev.imageURL) {
        i.src = (ev.imageURL.indexOf('http') === 0 ? ev.imageURL : (serverURL + ev.imageURL)) + '?t=' + Date.now();
        i.style.display = 'block';
      } else i.style.display = 'none';
      o.classList.add('visible');
      if (window.catT) clearTimeout(window.catT);
      if (ev.duration) window.catT = setTimeout(function () { o.classList.remove('visible'); }, ev.duration * 1000);
    }

    function applyA(d) {
      if(!d) return;
      var r = document.documentElement.style;
      if (d.tvBackgroundColor) r.setProperty('--bg', d.tvBackgroundColor);
      if (d.qrSize) r.setProperty('--qr-size', d.qrSize + 'px');
      var q = document.getElementById('qr-overlay');
      if (d.qrPosition) q.className = 'pos-' + d.qrPosition + (q.classList.contains('visible') ? ' visible' : '');
      var lb = document.getElementById('leaderboard');
      if (d.scoreAnimationMode) { lb.className = 'mode-' + d.scoreAnimationMode; }
      if (d.showScores) { 
          lb.style.display = (d.scoreAnimationMode === 'bottom-right' ? 'block' : 'flex'); 
          lb.classList.remove('hidden'); 
      } else if (d.showScores === false) { 
          lb.style.display = 'none'; 
          lb.classList.add('hidden'); 
      }
    }

    function showPodium(data) {
      log("PODIUM");
      var o = document.getElementById('podium-overlay'), c = document.getElementById('podium-steps');
      o.classList.add('visible');
      if (data && data.winners) {
        c.innerHTML = data.winners.map(function (w, idx) {
          return '<div class="podium-step"><div style="font-size:3rem">' + (idx + 1) + 'er</div><div style="font-size:5rem;font-weight:900">' + esc(w.name) + '</div><div>' + w.score + ' pts</div></div>';
        }).join('');
      } else c.innerHTML = '<div class="podium-step">Fin de partie !</div>';
    }

    function showCheater(d) {
      var o = document.getElementById('cheater-overlay');
      document.getElementById('cheater-name-text').textContent = d.name;
      document.getElementById('cheater-penalty-text').textContent = '-' + (d.penalty || 50) + ' PTS';
      o.classList.add('visible');
      setTimeout(function () { o.classList.remove('visible'); }, 6000);
    }

    function toggleP(p, msg) {
      var o = document.getElementById('pause-overlay');
      if (p) { o.classList.add('visible'); document.getElementById('pause-msg').textContent = msg || ""; }
      else o.classList.remove('visible');
    }

    function startPoll() {
      setInterval(function () {
        if (!serverURL) return;
        fetch(serverURL + '/tv_state').then(function (r) { return r.json() }).then(handle).catch(function () { });
      }, 5000);
    }

    function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ""; }

    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, function (req) {
      log("LOAD");
      if (req.media && req.media.customData && req.media.customData.serverURL) initS(req.media.customData.serverURL);
      if (req.media && req.media.metadata) {
        updateT({
          trackID: req.media.customData.trackID,
          title: req.media.metadata.title,
          artist: req.media.metadata.artist,
          cover: "/cover_blurred/" + req.media.customData.trackID,
          shouldBlur: true
        });
      }
      return req;
    });

    ctx.addCustomMessageListener('urn:x-cast:com.qwizz.control', function (e) { handle(e.data); });

    var options = new cast.framework.CastReceiverOptions();
    options.maxInactivity = 86400;
    ctx.start(options);
    log("Ctx Started");
  </script>
</body>
</html>
/body>

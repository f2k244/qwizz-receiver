<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QWIZZ Cast Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#09072B; --blue:#00A8FF; --purple:#8A2BE2; --font:'Outfit',sans-serif; --qr-size:22vmin; }
    *{margin:0;padding:0;box-sizing:border-box}
    body,html{width:100%;height:100%;background:var(--bg);color:#fff;font-family:var(--font);overflow:hidden;font-size:1.5vmin}
    #ambient{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(0,168,255,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 20%,rgba(138,43,226,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
    #pause-overlay{position:fixed;inset:0;background:rgba(9,7,43,0.95);backdrop-filter:blur(30px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9000;text-align:center;padding:4vmin}
    #pause-overlay.visible{display:flex}
    #pause-overlay h1{font-size:10rem;color:var(--blue);font-weight:900;letter-spacing:1vmin}
    #podium-overlay{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9500;padding:6vmin}
    #podium-overlay.visible{display:flex}
    #player{position:fixed;inset:0;display:grid;grid-template-columns:40vw 1fr;padding:8vmin;gap:8vmin;align-items:center;opacity:0;transition:opacity .8s;z-index:10}
    #player.visible{opacity:1}
    #cover{width:60vmin;height:60vmin;border-radius:3vmin;border:0.3vmin solid rgba(255,255,255,.2);object-fit:contain;box-shadow:0 40px 100px rgba(0,0,0,.7);display:none}
    #cover-placeholder{width:50vmin;height:50vmin;border-radius:2.5vmin;border:2px dashed rgba(0,168,255,.2);display:flex;align-items:center;justify-content:center;font-size:20rem;color:rgba(0,168,255,.2)}
    .track-title{font-size:5rem;font-weight:900;margin-bottom:1.5rem;text-shadow:0 2px 30px rgba(0,168,255,.3)}
    #leaderboard{background:rgba(26,26,58,.9);border-radius:24px;padding:3vmin;backdrop-filter:blur(20px);z-index:20}
    #leaderboard.hidden{display:none!important}
    .lb-row.cheater{background:rgba(255,0,0,0.15)!important;border:1px solid rgba(255,0,0,0.4)!important}
    #qr-overlay{position:fixed;z-index:10000;display:none;background:rgba(26,26,58,.95);padding:3vmin;border-radius:4vmin;border:1px solid var(--blue);text-align:center;top:50%;left:50%;transform:translate(-50%,-50%)}
    #qr-overlay.visible{display:flex;flex-direction:column;align-items:center;gap:2vmin}
    #qr-img{width:var(--qr-size);height:var(--qr-size);background:#fff;padding:1.5vmin;border-radius:2vmin}
  </style>
</head>
<body>
  <div id="pause-overlay"><h1>PAUSE</h1><p id="pause-msg" style="font-size:3rem"></p></div>
  <div id="podium-overlay"><h1 style="font-size:5rem">CLASSEMENT FINAL</h1><div id="podium-steps" style="display:flex;align-items:flex-end;gap:4vmin;margin-top:5vmin"></div></div>
  <div id="player"><div id="cover-wrap"><img id="cover" src=""><div id="cover-placeholder">?</div></div><div><div class="track-title" id="track-title"></div><div id="track-artist" style="font-size:2.5rem;color:#ccc"></div></div></div>
  <div id="leaderboard" class="hidden mode-full"><div id="lb-list"></div></div>
  <div id="qr-overlay" class="visible"><div style="font-size:1.8rem;color:var(--blue);font-weight:700">Scanner & Jouer</div><img id="qr-img" src=""></div>
<script>
var castCtx=cast.framework.CastReceiverContext.getInstance(),serverURL='',socket,appState={showCheaterStatus:true};
castCtx.addCustomMessageListener('urn:x-cast:com.qwizz.control',e=>{if(e.data.serverURL)init(e.data.serverURL)});
function init(u){serverURL=u;connectWS()}castCtx.start();
function connectWS(){if(!serverURL)return;socket=new WebSocket(serverURL.replace('http','ws')+'/ws');
socket.onmessage=e=>{var d=JSON.parse(e.data);
if(d.type==='appearance'){Object.assign(appState,d.data);if(d.data.showScores!==undefined){d.data.showScores?showLB():hideLB()}}
else if(d.type==='track_update'){document.getElementById('track-title').textContent=d.title;document.getElementById('track-artist').textContent=d.artist;var i=document.getElementById('cover'),p=document.getElementById('cover-placeholder');if(d.cover){i.style.display='block';p.style.display='none';i.src=serverURL+d.cover+'?'+Date.now()}showP()}
else if(d.type==='leaderboard')renderLB(d.players);
else if(d.type==='show_qr'){var q=document.getElementById('qr-overlay');if(d.show){document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?data='+encodeURIComponent(d.url||serverURL);q.style.display='flex'}else q.style.display='none'}
else if(d.type==='isPaused'){var o=document.getElementById('pause-overlay');if(d.data){o.classList.add('visible');document.getElementById('pause-msg').textContent=d.pauseMessage}else o.classList.remove('visible')}};
socket.onclose=()=>setTimeout(connectWS,2000);socket.onopen=()=>poll()}
function renderLB(p){var l=document.getElementById('lb-list'),s=p.sort((a,b)=>b.score-a.score).slice(0,10);
l.innerHTML=s.map((x,i)=>{var c=x.isCheating&&appState.showCheaterStatus;return `<div class="lb-row ${c?'cheater':''}" style="display:flex;align-items:center;gap:2rem;padding:1rem;opacity:1"><span style="font-size:2rem;width:3rem">${i+1}</span><span style="flex:1;font-size:2rem">${x.name}${c?' ⚠️ TRICHE':''}</span><span style="font-size:2rem">${x.score} pts</span></div>`}).join('')}
function showLB(){document.getElementById('leaderboard').classList.remove('hidden')}
function hideLB(){document.getElementById('leaderboard').classList.add('hidden')}
function showP(){document.getElementById('player').style.opacity=1}
function poll(){if(!serverURL)return;fetch(serverURL+'/tv_state').then(r=>r.json()).then(s=>{if(s.players)renderLB(s.players)}).catch(()=>{});setTimeout(poll,5000)}
</script>
</body>
</html>

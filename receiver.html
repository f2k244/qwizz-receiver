<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QWIZZ Cast Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#09072B; --blue:#00A8FF; --purple:#8A2BE2; --font:'Outfit',sans-serif; --qr-size:200px; }
    *{margin:0;padding:0;box-sizing:border-box}
    body,html{width:100%;height:100%;background:var(--bg);color:#fff;font-family:var(--font);overflow:hidden}
    #ambient{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(0,168,255,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 20%,rgba(138,43,226,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
    #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;z-index:200;transition:opacity 1s ease}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash h1{font-size:5rem;font-weight:900;letter-spacing:8px;background:linear-gradient(to right,var(--blue),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    #splash p{font-size:1.3rem;color:rgba(255,255,255,.6)}
    #splash .loader{width:48px;height:48px;border:4px solid rgba(0,168,255,.15);border-top:4px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite}
    #idle{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;align-items:center;z-index:100;transition:opacity .8s ease}
    #idle.gone{opacity:0;pointer-events:none}
    .idle-content{display:flex;flex-direction:column;align-items:center;text-align:center;animation:fadeInUp 1s ease-out}
    .idle-logo{width:420px;margin-bottom:40px;filter:drop-shadow(0 0 40px rgba(0,168,255,.6));animation:pulse-anim 3s infinite ease-in-out}
    .idle-title{font-size:4rem;font-weight:900;letter-spacing:8px;background:linear-gradient(to right,var(--blue),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .idle-sub{font-size:1.5rem;color:rgba(255,255,255,.5);margin-top:20px}
    #player{position:fixed;inset:0;display:grid;grid-template-columns:1fr 1fr;padding:60px;gap:60px;align-items:center;opacity:0;pointer-events:none;transition:opacity .8s;z-index:10}
    #player.visible{opacity:1}
    #cover-wrap{display:flex;align-items:center;justify-content:center}
    #cover{width:680px;height:680px;border-radius:32px;border:3px solid rgba(255,255,255,.2);object-fit:contain;background:rgba(0,0,0,0.3);box-shadow:0 40px 100px rgba(0,0,0,.7),0 0 80px rgba(0,168,255,.2);display:none;animation:artworkIn .6s ease;transition:transform 0.5s ease}
    #cover-placeholder{width:480px;height:480px;border-radius:24px;border:2px dashed rgba(0,168,255,0.25);background:rgba(26,26,58,.5);display:flex;align-items:center;justify-content:center;font-size:200px;font-weight:900;color:rgba(0,168,255,.3)}
    .right{display:flex;flex-direction:column;gap:40px}
    .logo-area{position:fixed;top:40px;right:60px;z-index:999}
    .logo-area img{width:340px;height:auto;object-fit:contain}
    .track-title{font-size:52px;font-weight:700;line-height:1.1;margin-bottom:12px;text-shadow:0 2px 30px rgba(0,168,255,.3)}
    .track-artist{font-size:28px;color:#E0E0E0;font-weight:300}
    #bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:20px 60px;display:flex;justify-content:flex-end;align-items:center;background:linear-gradient(to top,rgba(9,7,43,.9),transparent);z-index:50}
    #connection-dot{width:10px;height:10px;border-radius:50%;background:#f44;box-shadow:0 0 8px #f44;transition:all .4s}
    #connection-dot.ok{background:#00ff88;box-shadow:0 0 8px #00ff88}
    #leaderboard{background:rgba(26,26,58,.9);border:1px solid rgba(0,168,255,.25);border-radius:24px;padding:30px;backdrop-filter:blur(20px);z-index:20}
    #leaderboard.hidden{display:none!important}
    #leaderboard.mode-full{position:fixed;inset:60px;display:flex;flex-direction:column;justify-content:center;align-items:center}
    #leaderboard.mode-full .lb-title{font-size:52px;margin-bottom:44px;text-align:center}
    #leaderboard.mode-full #lb-list{width:80%;max-width:900px}
    #leaderboard.mode-full .lb-row{padding:22px 20px;font-size:34px;margin-bottom:8px;border-radius:16px}
    #leaderboard.mode-bottom-right{position:fixed;bottom:60px;right:60px;width:420px}
    .lb-title{font-weight:900;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:20px}
    .lb-row{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.05);opacity:0}
    .lb-rank{width:44px;font-size:inherit;text-align:center;font-weight:900}
    .lb-name{flex:1;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .lb-score{font-size:inherit;font-weight:900;color:var(--blue);font-family:monospace}
    .lb-row.top1 .lb-score{color:gold;text-shadow:0 0 12px gold}
    .lb-row.top2 .lb-score{color:#C0C0C0;text-shadow:0 0 12px silver}
    .lb-row.top3 .lb-score{color:#CD7F32;text-shadow:0 0 12px #CD7F32}
    #qr-overlay{position:fixed;z-index:2000;display:none;background:rgba(26,26,58,.9);backdrop-filter:blur(15px);padding:28px;border-radius:36px;border:1px solid rgba(0,168,255,.3);text-align:center;width:calc(var(--qr-size) + 56px)}
    #qr-overlay.visible{display:flex;flex-direction:column;align-items:center;gap:16px}
    #qr-overlay img{border-radius:16px;background:#fff;padding:12px;width:var(--qr-size);height:var(--qr-size)}
    #pause-overlay{position:fixed;inset:0;background:rgba(9,7,43,0.95);backdrop-filter:blur(30px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9000;text-align:center;padding:40px}
    #pause-overlay.visible{display:flex}
    #pause-overlay h1{font-size:6rem;color:var(--blue);margin-bottom:30px;font-weight:900;letter-spacing:10px}
    #pause-overlay p{font-size:2.5rem;color:#fff;max-width:1100px;line-height:1.4}
    #podium-overlay{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9500;padding:60px}
    #podium-overlay.visible{display:flex}
    .podium-container{display:flex;align-items:flex-end;gap:50px;margin-top:120px}
    .podium-step{display:flex;flex-direction:column;align-items:center;gap:20px}
    .podium-block{width:260px;background:linear-gradient(135deg,#1A1A3A,#09072B);border:3px solid var(--blue);border-radius:24px 24px 0 0;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:900;box-shadow:0 0 50px rgba(0,168,255,0.3)}
    .step-1 .podium-block{height:450px;border-color:gold;box-shadow:0 0 80px rgba(255,215,0,0.4)}
    .step-2 .podium-block{height:320px;border-color:silver}
    .step-3 .podium-block{height:220px;border-color:#CD7F32}
    .podium-name{font-size:42px;font-weight:900;text-align:center}
    .podium-score{font-size:30px;color:var(--blue)}
    .lb-row.cheater{background:rgba(255,0,0,0.1) !important;border:1px solid rgba(255,0,0,0.3) !important}
    .cheater-label{font-size:14px;color:#ff4444;font-weight:900;margin-left:10px;text-transform:uppercase}
    @keyframes spin{100%{transform:rotate(360deg)}}
    @keyframes pulse-anim{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes artworkIn{from{opacity:0;transform:scale(.92) rotate(-2deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  </style>
</head>
<body>
  <div id="ambient"></div>
  <div id="pause-overlay"><h1>PAUSE</h1><p id="pause-msg">On revient d'ici peu !</p><div class="loader" style="margin-top:80px; width:64px; height:64px"></div></div>
  <div id="podium-overlay"><h1 style="font-size:5rem;font-weight:900;background:linear-gradient(to right,gold,var(--blue));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">CLASSEMENT FINAL</h1><div class="podium-container" id="podium-steps"></div></div>
  <div id="splash"><h1>QWIZZ</h1><div class="loader"></div><p id="splash-status">En attente de connexion...</p><p class="server-url" id="splash-server"></p></div>
  <div id="idle"><div class="idle-content"><img id="idle-logo" src="" class="idle-logo" onerror="this.style.display='none'"><div class="idle-title">PRÊT À QWIZZER ?</div><div class="idle-sub">Veuillez attendre le début de la musique...</div></div></div>
  <div id="player"><div id="cover-wrap"><img id="cover" src=""><div id="cover-placeholder">?</div></div><div class="right"><div class="logo-area"><img id="logo-img" src="" onerror="this.style.display='none'"></div><div><div class="track-title" id="track-title">En attente...</div><div class="track-artist" id="track-artist">Prêt à buzzer ?</div></div></div></div>
  <div id="leaderboard" class="hidden mode-full"><div class="lb-title">🏆 Classement</div><div id="lb-list"></div></div>
  <div id="bottom-bar"><div id="connection-dot"></div></div>
  <div id="qr-overlay" class="pos-center"><div id="qr-label">Scanner &amp; Jouer</div><img id="qr-img" src=""></div>
<script>
var castCtx = cast.framework.CastReceiverContext.getInstance();
var serverURL = '';
var socket;
var reconnectDelay = 1000;
var revealAnim = 'random';
var tickerPlayers = [];
var tickerIdx = 0;
var tickerTimer = null;
var isAnimating = false;
castCtx.addCustomMessageListener('urn:x-cast:com.qwizz.control', function(e) { if (e.data && e.data.serverURL && !serverURL) initServer(e.data.serverURL); });
function initServer(url) { serverURL = url; document.getElementById('splash-server').textContent = url; document.getElementById('splash-status').textContent = 'Connexion à ' + url + '...'; document.getElementById('idle-logo').src = url + '/tv_logo'; document.getElementById('logo-img').src = url + '/tv_logo'; connectWS(); }
castCtx.start();
function connectWS() { if (!serverURL) return; var wsURL = serverURL.replace('http://', 'ws://') + '/ws'; try { socket = new WebSocket(wsURL); } catch(e) { scheduleReconnect(); return; }
socket.onopen = function() { document.getElementById('connection-dot').classList.add('ok'); document.getElementById('splash').classList.add('hidden'); setTimeout(function(){ document.getElementById('splash').style.display='none'; }, 1000); pollState(); };
socket.onmessage = function(e) { try { handle(JSON.parse(e.data)); } catch(x) {} };
socket.onclose = function() { document.getElementById('connection-dot').classList.remove('ok'); scheduleReconnect(); }; }
function scheduleReconnect() { setTimeout(connectWS, reconnectDelay); reconnectDelay = Math.min(reconnectDelay * 1.5, 10000); }
function handle(d) {
  if (d.type === 'track_update') {
    document.getElementById('track-title').textContent = d.title || '?';
    document.getElementById('track-artist').textContent = d.artist || '';
    var img = document.getElementById('cover'), ph = document.getElementById('cover-placeholder');
    if (d.cover && d.cover !== '' && serverURL) { img.onload = function(){ img.style.display='block'; ph.style.display='none'; }; img.src = serverURL + d.cover + '?' + Date.now(); } else { img.style.display='none'; ph.style.display='flex'; }
    showPlayer();
  } else if (d.type === 'leaderboard') { renderLeaderboard(d.players); } 
  else if (d.type === 'appearance') { applyAppearance(d.data); } 
  else if (d.type === 'isPaused') {
    const over = document.getElementById('pause-overlay');
    if (d.data) { document.getElementById('pause-msg').innerText = d.pauseMessage || "On revient d'ici peu !"; over.classList.add('visible'); } else { over.classList.remove('visible'); }
  } else if (d.type === 'end_game') { showPodium(d.data); }
}
function applyAppearance(data) {
  var root = document.documentElement;
  if (data.tvBackgroundColor) root.style.setProperty('--bg', data.tvBackgroundColor);
  if (data.qrSize) root.style.setProperty('--qr-size', data.qrSize + 'px');
  var lb = document.getElementById('leaderboard');
  if (data.scoreAnimationMode) { lb.classList.remove('mode-full','mode-bottom-right'); lb.classList.add('mode-' + data.scoreAnimationMode); }
  if (data.showScores === true) showLeaderboard(); else if (data.showScores === false) hideLeaderboard();
  if (data.tvCoverScale) document.getElementById('cover').style.transform = 'scale(' + data.tvCoverScale + ')';
}
function renderLeaderboard(players) {
  var list = document.getElementById('lb-list');
  var sorted = players.sort((a,b)=>b.score - a.score).slice(0,10);
  list.innerHTML = sorted.map((p,i)=>`<div class="lb-row ${p.isCheating?'cheater':''}" style="opacity:1"><span class="lb-rank">${i+1}</span><span class="lb-name">${p.name}${p.isCheating?'<span class="cheater-label">⚠️ TRICHE !</span>':''}</span><span class="lb-score">${p.score} pts</span></div>`).join('');
}
function showLeaderboard() { document.getElementById('leaderboard').classList.remove('hidden'); }
function hideLeaderboard() { document.getElementById('leaderboard').classList.add('hidden'); }
function showPodium(data) {
  const over = document.getElementById('podium-overlay');
  const container = document.getElementById('podium-steps');
  over.classList.add('visible');
  container.innerHTML = `<div class="podium-step step-2"><div class="podium-name">${data[1]?.name||''}</div><div class="podium-score">${data[1]?.score||0} pts</div><div class="podium-block">2</div></div><div class="podium-step step-1"><div class="podium-name">${data[0]?.name||''}</div><div class="podium-score">${data[0]?.score||0} pts</div><div class="podium-block">1</div></div><div class="podium-step step-3"><div class="podium-name">${data[2]?.name||''}</div><div class="podium-score">${data[2]?.score||0} pts</div><div class="podium-block">3</div></div>`;
}
function showPlayer() { document.getElementById('idle').classList.add('gone'); document.getElementById('player').classList.add('visible'); }
function pollState() { if (!serverURL) return; fetch(serverURL + '/tv_state').then(r=>r.json()).then(s=>{ if (s.players) renderLeaderboard(s.players); if (s.isPaused) { document.getElementById('pause-overlay').classList.add('visible'); document.getElementById('pause-msg').innerText = s.pauseMessage; } else { document.getElementById('pause-overlay').classList.remove('visible'); } if (s.podiumData) showPodium(s.podiumData); }).catch(e=>{}); setTimeout(pollState, 5000); }
</script>
</body>
</html>

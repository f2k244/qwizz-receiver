<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QWIZZ Cast Receiver V5.0.2 - RECOVERY</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09072B;
      --blue: #00A8FF;
      --purple: #8A2BE2;
      --font: 'Outfit', sans-serif;
      --qr-size: 22vmin;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: var(--font);
      overflow: hidden;
      font-size: 1.5vmin
    }

    #ambient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0, 168, 255, .12) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 80% 20%, rgba(138, 43, 226, .10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3vmin;
      z-index: 10000;
      transition: opacity 1s ease
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #idle {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity .8s ease
    }

    #idle.gone {
      opacity: 0;
      pointer-events: none
    }

    .idle-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeInUp 1.2s ease-out
    }

    .idle-logo {
      width: 85vmin;
      height: auto;
      margin-bottom: 4vmin;
      filter: drop-shadow(0 0 80px rgba(0, 168, 255, 0.7));
    }

    #player {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 40vw 1fr;
      padding: 8vmin;
      gap: 8vmin;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s;
      z-index: 10
    }

    #player.visible {
      opacity: 1
    }

    .cover-wrapper {
      position: relative;
      width: 55vmin;
      height: 55vmin;
      border-radius: 3vmin;
      overflow: hidden;
      border: 0.3vmin solid rgba(255, 255, 255, .2);
      box-shadow: 0 40px 100px rgba(0, 0, 0, .7);
      background: rgba(0, 0, 0, 0.3)
    }

    #cover,
    #cover-blurred {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      opacity: 0;
    }

    #cover {
      z-index: 2;
    }

    #cover-blurred {
      z-index: 1;
      filter: blur(25px) brightness(0.8);
    }

    cast-media-player {
      position: fixed;
      inset: 0;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.8s;
      --theme-hue: 200;
      background: var(--bg);
    }

    body.video-revealed cast-media-player {
      opacity: 1;
      z-index: 100 !important;
    }

    #cover-placeholder {
      position: absolute;
      inset: 0;
      border-radius: 2.5vmin;
      border: 2px dashed rgba(0, 168, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20rem;
      color: rgba(0, 168, 255, .2);
      z-index: 0
    }

    .logo-area {
      position: fixed;
      top: 4vmin;
      right: 6vmin;
      z-index: 9999
    }

    .logo-area img {
      width: 25vmin;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5))
    }

    .track-title {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5)
    }

    .track-artist {
      font-size: 2.5rem;
      color: #E0E0E0;
      font-weight: 300
    }

    #leaderboard {
      position: fixed;
      background: rgba(26, 26, 58, .95);
      border: 1px solid rgba(0, 168, 255, .3);
      border-radius: 3vmin;
      padding: 4vmin;
      backdrop-filter: blur(30px);
      z-index: 9000;
      display: none
    }

    #leaderboard.mode-full {
      inset: 8vmin;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center
    }

    #leaderboard.mode-bottom-right {
      bottom: 4vmin;
      right: 4vmin;
      width: 30vw;
      display: block
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 2vmin;
      background: rgba(255, 255, 255, .05);
      padding: 1.5vmin 2vmin;
      border-radius: 1.5vmin;
      margin-bottom: 1vmin;
      opacity: 0;
      transition: all 0.5s ease;
    }

    .lb-rank { width: 5vmin; font-weight: 900; font-size: 2rem; text-align: center; }
    .lb-name { flex: 1; font-weight: 700; font-size: 2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 900; color: var(--blue); font-size: 2rem; }
    .lb-row.cheater { background: rgba(255, 0, 0, 0.15); border: 1px solid rgba(255, 0, 0, 0.4); }

    #qr-overlay {
      position: fixed;
      z-index: 10000;
      display: none;
      background: rgba(26, 26, 58, 0.98);
      backdrop-filter: blur(20px);
      padding: 3vmin;
      border-radius: 4vmin;
      border: 1px solid var(--blue);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6)
    }

    #qr-img { width: var(--qr-size); height: var(--qr-size); background: #fff; padding: 1.5vmin; border-radius: 2vmin; }

    #pause-overlay, #rules-overlay, #category-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9, 7, 43, 0.98);
      backdrop-filter: blur(40px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8000;
      text-align: center;
      padding: 5vmin;
    }

    #pause-overlay.visible, #rules-overlay.visible, #category-overlay.visible { display: flex; }

    .category-image {
      width: 45vmin;
      height: 45vmin;
      border-radius: 4vmin;
      object-fit: cover;
      border: 3px solid var(--blue);
      box-shadow: 0 0 80px rgba(0, 168, 255, 0.4);
      margin-bottom: 4vmin;
    }

    #cheater-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9, 7, 43, 0.85);
      z-index: 100000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    #cheater-overlay.visible { display: flex; }

    .cheater-card {
      background: #1A1A3A;
      border: 0.8vmin solid #ff4b2b;
      padding: 8vmin 15vmin;
      border-radius: 4vmin;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 0 10vmin rgba(255, 75, 43, 0.4);
      animation: popIn .6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

    #debug-log {
      position: fixed; bottom: 2vmin; left: 2vmin; z-index: 100000;
      background: rgba(0, 0, 0, 0.7); color: #0f0; font-family: monospace;
      font-size: 1.2vmin; padding: 1vmin; border-radius: 1vmin;
      max-width: 40vw; max-height: 20vh; overflow-y: auto;
      pointer-events: none; display: none;
    }
  </style>
</head>

<body>
  <div id="ambient"></div>
  <div id="splash">
    <h1 style="font-size:6rem;color:var(--blue);font-weight:900;letter-spacing:1.5vmin">QWIZZ</h1>
    <div style="width:5vmin;height:5vmin;border:0.5vmin solid rgba(0,168,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:rotate 1s linear infinite;margin-top:2vmin"></div>
    <p id="splash-status" style="font-size:1.5rem;opacity:0.6;margin-top:2vmin">Connexion...</p>
  </div>

  <div id="idle">
    <div class="idle-content">
      <img id="idle-logo" class="idle-logo">
      <div style="font-size:7rem;font-weight:900;letter-spacing:1.5vmin;color:var(--blue)">PRÊT À QWIZZER ?</div>
      <div style="font-size:2rem;color:rgba(255,255,255,.4);margin-top:2rem">En attente du début de la partie...</div>
    </div>
  </div>

  <div id="player">
    <div style="display:flex;align-items:center;justify-content:center">
      <div class="cover-wrapper">
        <div id="cover-placeholder">?</div>
        <img id="cover-blurred">
        <img id="cover">
      </div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:center">
      <div class="track-title" id="track-title"></div>
      <div class="track-artist" id="track-artist"></div>
    </div>
  </div>

  <div id="leaderboard" class="mode-bottom-right">
    <div style="font-weight:900;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:3vmin;font-size:2.5rem">🏆 Classement</div>
    <div id="lb-list" style="width:100%"></div>
  </div>

  <div id="qr-overlay" style="top:4vmin; right:4vmin;">
    <div style="font-size:2rem;color:var(--blue);font-weight:900;margin-bottom:1.5vmin">Scanner pour Rejoindre</div>
    <img id="qr-img">
  </div>

  <div id="pause-overlay"><h1>PAUSE</h1><div id="pause-msg" style="font-size:3rem;max-width:80vw;line-height:1.4"></div></div>
  <div id="rules-overlay"><div class="rules-card"><h1 id="rules-mode" style="font-size:5rem;font-weight:900;color:var(--blue);text-transform:uppercase;margin-bottom:2vmin;">MODE</h1><p id="rules-text" style="font-size:2.5rem;line-height:1.4;"></p></div></div>
  <div id="category-overlay"><div class="category-card"><img id="category-img" class="category-image" style="display:none"><h1 id="category-name-display" style="font-size:8rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5vmin">CATEGORY</h1></div></div>

  <div id="cheater-overlay">
    <div class="cheater-card">
      <div style="color:#ff4b2b;font-size:3.5rem;font-weight:900;letter-spacing:2vmin;margin-bottom:4vmin">ALERTE TRICHE</div>
      <div id="cheater-name-text" style="font-size:9rem;font-weight:900;color:white;margin-bottom:2vmin">PLAYER</div>
      <div style="font-size:3rem;color:rgba(255,255,255,0.6);text-transform:uppercase">Sanction confirmée</div>
      <div id="cheater-penalty-text" style="background:#ff4b2b;color:white;font-size:5rem;font-weight:900;padding:2vmin 6vmin;border-radius:2vmin;margin-top:6vmin">-50 PTS</div>
    </div>
  </div>

  <div class="logo-area" id="main-logo-wrap"><img id="logo-img"></div>
  <cast-media-player></cast-media-player>
  <div id="debug-log"></div>

  <script>
    var serverURL = '';
    var lastCategoryTime = 0;
    var lastTrackId = null;
    
    function log(m) {
      console.log(m);
      var l = document.getElementById('debug-log');
      if(l) {
        var d = document.createElement('div');
        d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + m;
        l.appendChild(d);
        l.scrollTop = l.scrollHeight;
      }
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    function initS(u) {
      if(!u || u === serverURL) return;
      serverURL = u;
      log("SYNC SERVER: " + u);
      document.getElementById('splash').classList.add('hidden');
      ['logo-img', 'idle-logo'].forEach(id => {
        var el = document.getElementById(id);
        if(el) el.src = u + '/tv_logo?t=' + Date.now();
      });
      startPoll();
    }

    function handle(d) {
      if(!d) return;
      if(d.players) renderLB(d.players);
      if(d.track) updateT(d.track);
      if(d.reveal === true) revealCover();
      if(d.isPaused !== undefined) toggleP(d.isPaused, d.pauseMessage);
      if(d.showScores !== undefined) applyA({showScores: d.showScores, scoreAnimationMode: d.scoreAnimationMode});
      if(d.showQR !== undefined) toggleQR(d.showQR, d.qrURL);
      
      // Event based
      if(d.type === 'track_update') updateT(d);
      else if(d.type === 'leaderboard') renderLB(d.players);
      else if(d.type === 'show_qr') toggleQR(d.show, d.url);
      else if(d.type === 'category_transition' && d.timestamp > lastCategoryTime) {
        lastCategoryTime = d.timestamp;
        showCat(d);
      }
      else if(d.type === 'cheater_alert') showCheater(d);
    }

    function updateT(d) {
      if(!d || !d.trackID) {
        lastTrackId = null;
        document.getElementById('idle').classList.remove('gone');
        document.getElementById('player').classList.remove('visible');
        return;
      }
      if(d.trackID === lastTrackId && d.shouldBlur === (window.lastBlur)) return;
      
      lastTrackId = d.trackID;
      window.lastBlur = d.shouldBlur;
      
      document.getElementById('idle').classList.add('gone');
      document.getElementById('player').classList.add('visible');
      document.body.classList.remove('video-revealed');
      document.getElementById('category-overlay').classList.remove('visible');
      
      document.getElementById('track-title').textContent = d.title || "";
      document.getElementById('track-artist').textContent = d.artist || "";
      
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred'), p = document.getElementById('cover-placeholder');
      if(d.cover) {
        var src = (d.cover.startsWith('http') ? d.cover : serverURL + d.cover) + '&t=' + Date.now();
        if(d.shouldBlur) {
          b.src = src; b.onload = () => { b.style.opacity = '1'; p.style.display = 'none'; };
          i.style.opacity = '0';
        } else {
          i.src = src; i.onload = () => { i.style.opacity = '1'; p.style.display = 'none'; };
          b.style.opacity = '0';
        }
      } else {
        p.style.display = 'flex'; i.style.opacity = '0'; b.style.opacity = '0';
      }
    }

    function revealCover() {
      document.body.classList.add('video-revealed');
      var i = document.getElementById('cover'), b = document.getElementById('cover-blurred');
      if(i && window.lastTrackData && window.lastTrackData.cover_clear) {
         var src = (window.lastTrackData.cover_clear.startsWith('http') ? window.lastTrackData.cover_clear : serverURL + window.lastTrackData.cover_clear) + '&t=' + Date.now();
         i.src = src; i.style.opacity = '1'; b.style.opacity = '0';
      }
    }

    function renderLB(players) {
      var l = document.getElementById('lb-list');
      var s = players.sort((a,b) => b.score - a.score).slice(0, 10);
      l.innerHTML = s.map((p, idx) => `
        <div class="lb-row ${p.isCheating ? 'cheater' : ''}" style="opacity:1">
          <span class="lb-rank">${idx+1}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-score">${p.score} pts</span>
        </div>
      `).join('');
    }

    function showCat(d) {
      document.getElementById('category-name-display').textContent = d.name;
      var i = document.getElementById('category-img');
      if(d.hasImage && d.imageURL) {
        i.src = (d.imageURL.startsWith('http') ? d.imageURL : serverURL + d.imageURL) + '?t=' + Date.now();
        i.style.display = 'block';
      } else i.style.display = 'none';
      document.getElementById('category-overlay').classList.add('visible');
      if(d.duration) setTimeout(() => document.getElementById('category-overlay').classList.remove('visible'), d.duration * 1000);
    }

    function toggleP(p, m) {
      var o = document.getElementById('pause-overlay');
      if(p) { o.classList.add('visible'); document.getElementById('pause-msg').textContent = m || ""; }
      else o.classList.remove('visible');
    }

    function toggleQR(show, url) {
      var q = document.getElementById('qr-overlay');
      if(show) {
        document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url || serverURL);
        q.classList.add('visible');
      } else q.classList.remove('visible');
    }

    function showCheater(d) {
      var o = document.getElementById('cheater-overlay');
      document.getElementById('cheater-name-text').textContent = d.name;
      document.getElementById('cheater-penalty-text').textContent = '-' + (d.penalty || 50) + ' PTS';
      o.classList.add('visible');
      setTimeout(() => o.classList.remove('visible'), 6000);
    }

    function applyA(d) {
      var lb = document.getElementById('leaderboard');
      if(d.showScores) lb.style.display = (d.scoreAnimationMode === 'bottom-right' ? 'block' : 'flex');
      else lb.style.display = 'none';
    }

    function startPoll() {
      setInterval(() => {
        if(!serverURL) return;
        fetch(serverURL + '/tv_state').then(r => r.json()).then(handle).catch(()=>{});
      }, 5000);
    }

    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, req => {
      log("LOAD RECEIVED");
      if(req.media && req.media.customData && req.media.customData.serverURL) initS(req.media.customData.serverURL);
      return req;
    });

    context.addCustomMessageListener('urn:x-cast:com.qwizz.control', e => handle(e.data));
    
    const options = new cast.framework.CastReceiverOptions();
    options.maxInactivity = 86400;
    context.start(options);
    log("Receiver Started V5.0.2-Recovery");
  </script>
</body>
</html>
